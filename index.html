// ====== CONSTANTS ======
const RANDOM_HISTORY_MAX = 10;
const STORAGE_KEYS = { favorites: 'eat_favs', hates: 'eat_hates', history: 'eat_history' };
const CUISINE_GROUPS = [
  { label: '🍜 粤菜/茶餐厅', match: c => /粤菜|茶餐厅|广式点心|港式|早茶|肠粉|烧腊|潮汕/.test(c) },
  { label: '🌶️ 川菜/湘菜', match: c => /川菜|湘菜|酸菜鱼|麻辣/.test(c) },
  { label: '🫕 火锅', match: c => /火锅/.test(c) },
  { label: '🥩 烤肉/烧烤', match: c => /烤肉|烧烤|烧肉/.test(c) },
  { label: '🍣 日料', match: c => /日料|寿司|日式|居酒屋/.test(c) },
  { label: '🇰🇷 韩式', match: c => /韩式|韩国/.test(c) },
  { label: '🥗 西餐/轻食', match: c => /西餐|牛排|轻食|西式|披萨|沙拉/.test(c) },
  { label: '🍛 东南亚菜', match: c => /东南亚|泰国|越南|马来|新加坡/.test(c) },
  { label: '🥟 西北/面食', match: c => /西北|面食|陕西|兰州/.test(c) },
  { label: '🫖 江浙菜', match: c => /江浙|杭帮|淮扬|上海/.test(c) },
  { label: '☕ 咖啡/茶饮', match: c => /咖啡|茶饮|奶茶/.test(c) },
  { label: '🍰 甜品/烘焙', match: c => /甜品|糖水|烘焙|面包|蛋糕/.test(c) },
  { label: '🍔 小吃/快餐', match: c => /小吃|快餐|炸鸡|汉堡/.test(c) },
  { label: '🍢 其他', match: c => true }
];

function getCuisineGroup(category) {
  for (const g of CUISINE_GROUPS) {
    if (g.match(category)) return g.label;
  }
  return '🍢 其他';
}

// ====== STORAGE ======
function getFavorites() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.favorites) || '[]'); }
function setFavorites(f) { localStorage.setItem(STORAGE_KEYS.favorites, JSON.stringify(f)); }
function getHates() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.hates) || '[]'); }
function setHates(h) { localStorage.setItem(STORAGE_KEYS.hates, JSON.stringify(h)); }
function getHistory() { return JSON.parse(localStorage.getItem(STORAGE_KEYS.history) || '[]'); }
function setHistory(h) { localStorage.setItem(STORAGE_KEYS.history, JSON.stringify(h)); }

function isFavorite(name) { return getFavorites().includes(name); }
function isHated(name) { return getHates().includes(name); }

function toggleFav(name) {
  let f = getFavorites();
  if (f.includes(name)) { f = f.filter(n => n !== name); }
  else { f.unshift(name); }
  setFavorites(f);
  updateFavBadge();
  return f.includes(name);
}

function toggleHate(name) {
  let h = getHates();
  if (h.includes(name)) { h = h.filter(n => n !== name); }
  else { h.unshift(name); }
  setHates(h);
  return h.includes(name);
}

function addHistory(restaurant) {
  let h = getHistory();
  h = h.filter(item => item.name !== restaurant.name);
  h.unshift({ ...restaurant, time: new Date().toLocaleString('zh-CN') });
  if (h.length > 200) h = h.slice(0, 200);
  setHistory(h);
}

// ====== FILTER STATE ======
let activeCuisineGroup = 'all';
let activeArea = 'all';
let searchQuery = '';

function getFiltered() {
  return RESTAURANTS.filter(r => {
    if (searchQuery && !r.name.includes(searchQuery)) return false;
    if (activeCuisineGroup !== 'all' && getCuisineGroup(r.category) !== activeCuisineGroup) return false;
    if (activeArea !== 'all' && !r.location_area.includes(activeArea)) return false;
    return true;
  });
}

// ====== RENDER MENU ======
function renderMenu() {
  const grid = document.getElementById('resto-grid');
  const list = getFiltered();
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-lulu">😅</div><div class="empty-text">没有找到匹配的餐厅~<br>换个条件试试！</div></div>`;
    return;
  }
  grid.innerHTML = list.map(r => {
    const fav = isFavorite(r.name);
    const hate = isHated(r.name);
    return `
    <div class="resto-card ${hate ? 'hated' : ''}">
      <div class="resto-card-header">
        <span class="resto-name">${r.name}</span>
        <span class="resto-rating">⭐ ${r.rating}</span>
      </div>
      <div class="resto-tags">
        <span class="resto-tag cuisine-tag">${getCuisineGroup(r.category)}</span>
        <span class="resto-tag">${r.price_range}元</span>
        <span class="resto-tag">${r.location_area}</span>
      </div>
      <div class="resto-recommend">💡 ${r.recommend}</div>
      <div class="resto-card-actions">
        <button class="resto-action ${fav ? 'active-fav' : ''}" onclick="event.stopPropagation(); toggleFav('${r.name}'); renderMenu();">
          ${fav ? '❤️' : '🤍'} 收藏
        </button>
        <button class="resto-action ${hate ? 'active-hate' : ''}" onclick="event.stopPropagation(); toggleHate('${r.name}'); renderMenu();">
          ${hate ? '💔' : '🤍'} 踩雷
        </button>
        <button class="resto-action" onclick="event.stopPropagation(); eatNow('${r.name}')">
          🍽️ 就吃这个
        </button>
      </div>
    </div>`;
  }).join('');
}

function eatNow(name) {
  const r = RESTAURANTS.find(x => x.name === name);
  if (!r) return;
  addHistory(r);
  switchPage('history');
}

// ====== FILTER CHIPS ======
function buildFilterChips() {
  const scroll = document.getElementById('filter-scroll');
  const groups = [...new Set(RESTAURANTS.map(r => getCuisineGroup(r.category)))];
  scroll.innerHTML = `<button class="filter-chip active" data-cat="all" onclick="setCuisineFilter('all')">🍽️ 全部</button>` +
    groups.map(g => `<button class="filter-chip" data-cat="${g}" onclick="setCuisineFilter('${g}')">${g}</button>`).join('');
}

function setCuisineFilter(cat) {
  activeCuisineGroup = cat;
  document.querySelectorAll('.filter-chip').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === cat);
  });
  renderMenu();
}

function onSearch(q) {
  searchQuery = q;
  renderMenu();
}

  const dd = document.getElementById('filter-dropdown');
  dd.style.display = dd.style.display === 'none' ? 'block' : 'none';

}

  const groups = [...new Set(RESTAURANTS.map(r => getCuisineGroup(r.category)))];
  cuisineDiv.innerHTML = `<button class="filter-grid-chip active" data-val="all" onclick="setCuisineDropdown('all')">全部</button>` +
    groups.map(g => `<button class="filter-grid-chip" data-val="${g}" onclick="setCuisineDropdown('${g}')">${g}</button>`).join('');

  // Areas
  const areaDiv = document.getElementById('filter-area');
  const areas = [...new Set(RESTAURANTS.map(r => r.location_area))].sort();
  areaDiv.innerHTML = `<button class="filter-grid-chip active" data-val="all" onclick="setAreaDropdown('all')">全部</button>` +
    areas.map(a => `<button class="filter-grid-chip" data-val="${a}" onclick="setAreaDropdown('${a}')">${a}</button>`).join('');
}

function setCuisineDropdown(cat) {
  activeCuisineGroup = cat;
  document.querySelectorAll('#filter-cuisine .filter-grid-chip').forEach(el => {
    el.classList.toggle('active', el.dataset.val === cat);
  });
  document.querySelectorAll('.filter-chip').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === cat);
  });
  renderMenu();
}

function setAreaDropdown(area) {
  activeArea = area;
  document.querySelectorAll('#filter-area .filter-grid-chip').forEach(el => {
    el.classList.toggle('active', el.dataset.val === area);
  });
  renderMenu();
}

// ====== RANDOM ======
let randomResult = null;

function updateRandomBtn() {
  const filtered = getRandomFiltered();
  document.getElementById('random-range-info').textContent = `可在 ${filtered.length} 家中随机`;
}

function getRandomFiltered() {
  let list = [...RESTAURANTS];
  const cuisine = document.getElementById('random-cuisine').value;
  const area = document.getElementById('random-area').value;
  const price = document.getElementById('random-price').value;
  if (cuisine !== 'all') {
    if (cuisine === '__other') list = list.filter(r => !CUISINE_GROUPS.some(g => g.match(r.category)));
    else list = list.filter(r => getCuisineGroup(r.category) === cuisine);
  }
  if (area !== 'all') list = list.filter(r => r.location_area.includes(area));
  if (price !== 'all') {
    if (price === '0-50') list = list.filter(r => parseInt(r.price_range) <= 50);
    else if (price === '50-100') list = list.filter(r => { const p = parseInt(r.price_range); return p > 50 && p <= 100; });
    else if (price === '100-200') list = list.filter(r => { const p = parseInt(r.price_range); return p > 100 && p <= 200; });
    else if (price === '200+') list = list.filter(r => parseInt(r.price_range) > 200);
  }
  // Exclude hated
  const hates = getHates();
  list = list.filter(r => !hates.includes(r.name));
  return list;
}

function triggerRandom() {
  const list = getRandomFiltered();
  if (list.length === 0) {
    alert('😅 符合条件的餐厅都被你踩雷了！换个条件试试~');
    return;
  }
  const chosen = list[Math.floor(Math.random() * list.length)];
  randomResult = chosen;
  addHistory(chosen);

  // Show result
  const card = document.getElementById('random-card');
  const result = document.getElementById('result-card');
  card.style.display = 'none';
  result.style.display = 'block';

  document.getElementById('result-name').textContent = chosen.name;
  document.getElementById('result-tags').innerHTML =
    `<span class="resto-tag cuisine-tag">${getCuisineGroup(chosen.category)}</span>
     <span class="resto-tag">${chosen.price_range}元</span>
     <span class="resto-tag">${chosen.location_area}</span>
     <span class="resto-tag">⭐${chosen.rating}</span>`;
  document.getElementById('result-detail').textContent = '💡 ' + chosen.recommend;

  // Add to recent
  updateRecentRandom(chosen);
  renderHistory();
}

function closeResult() {
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('random-card').style.display = 'block';
}

function markRandomFav() {
  if (!randomResult) return;
  toggleFav(randomResult.name);
  document.querySelector('.fav-btn').textContent = '❤️ 已收藏';
  document.querySelector('.fav-btn').style.background = '#FFB6C1';
  updateFavBadge();
}

function markRandomHate() {
  if (!randomResult) return;
  toggleHate(randomResult.name);
  document.querySelector('.hate-btn').textContent = '💔 已踩雷';
  document.querySelector('.hate-btn').style.background = '#ddd';
  updateFavBadge();
}

let recentRandoms = [];

function updateRecentRandom(r) {
  recentRandoms = recentRandoms.filter(x => x.name !== r.name);
  recentRandoms.unshift(r);
  if (recentRandoms.length > RANDOM_HISTORY_MAX) recentRandoms = recentRandoms.slice(0, RANDOM_HISTORY_MAX);
  renderRecentRandom();
}

function renderRecentRandom() {
  const list = document.getElementById('recent-random-list');
  list.innerHTML = recentRandoms.map(r => `
    <div class="recent-random-item" onclick="pickAgain('${r.name}')">
      <span class="recent-item-name">${r.name}</span>
      <span class="recent-item-info">${getCuisineGroup(r.category)} · ${r.price_range}元</span>
    </div>
  `).join('');
}

function pickAgain(name) {
  const r = RESTAURANTS.find(x => x.name === name);
  if (!r) return;
  randomResult = r;
  const card = document.getElementById('random-card');
  const result = document.getElementById('result-card');
  card.style.display = 'none';
  result.style.display = 'block';
  document.getElementById('result-name').textContent = r.name;
  document.getElementById('result-tags').innerHTML =
    `<span class="resto-tag cuisine-tag">${getCuisineGroup(r.category)}</span>
     <span class="resto-tag">${r.price_range}元</span>
     <span class="resto-tag">${r.location_area}</span>
     <span class="resto-tag">⭐${r.rating}</span>`;
  document.getElementById('result-detail').textContent = '💡 ' + r.recommend;
}

// ====== FAVORITES ======
function renderFavorites() {
  const favs = getFavorites();
  const list = document.getElementById('fav-list');
  const empty = document.getElementById('fav-empty');
  const count = document.getElementById('fav-count');
  count.textContent = favs.length;

  if (favs.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = favs.map(name => {
    const r = RESTAURANTS.find(x => x.name === name);
    if (!r) return '';
    return `
    <div class="resto-card">
      <div class="resto-card-header">
        <span class="resto-name">${r.name}</span>
        <span class="resto-rating">⭐ ${r.rating}</span>
      </div>
      <div class="resto-tags">
        <span class="resto-tag cuisine-tag">${getCuisineGroup(r.category)}</span>
        <span class="resto-tag">${r.price_range}元</span>
        <span class="resto-tag">${r.location_area}</span>
      </div>
      <div class="resto-recommend">💡 ${r.recommend}</div>
      <div class="resto-card-actions">
        <button class="resto-action active-fav" onclick="toggleFav('${r.name}'); renderFavorites(); updateFavBadge();">❤️ 取消收藏</button>
        <button class="resto-action" onclick="addHistory(r); switchPage('history')">🍽️ 就吃这个</button>
      </div>
    </div>`;
  }).join('');
}

// ====== HISTORY ======
function renderHistory() {
  const h = getHistory();
  const list = document.getElementById('history-list');
  const empty = document.getElementById('history-empty');
  const count = document.getElementById('history-count');
  count.textContent = h.length;

  if (h.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // Stats
  const total = h.length;
  const uniqueCount = new Set(h.map(x => x.name)).size;
  const statsHtml = `
    <div class="history-stats">
      <div class="stat-card"><span class="stat-num">${total}</span> 次点餐</div>
      <div class="stat-card"><span class="stat-num">${uniqueCount}</span> 家餐厅</div>
    </div>
  `;

  list.innerHTML = statsHtml + h.map(item => `
    <div class="history-item">
      <div class="history-item-left">
        <div class="history-item-name">${item.name}</div>
        <div class="history-item-info">${getCuisineGroup(item.category)} · ${item.location_area}</div>
      </div>
      <div class="history-item-right">
        <span class="history-time">${item.time}</span>
        <button class="history-eat-again" onclick="eatAgain('${item.name}')">再吃 🍽️</button>
      </div>
    </div>
  `).join('');
}

function eatAgain(name) {
  const r = RESTAURANTS.find(x => x.name === name);
  if (!r) return;
  addHistory(r);
  renderHistory();
}

// ====== NAVIGATION ======
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');

  if (page === 'favorites') renderFavorites();
  if (page === 'history') renderHistory();
  if (page === 'random') updateRandomBtn();
  if (page === 'menu') renderMenu();
}

function updateFavBadge() {
  const count = getFavorites().length;
  const badge = document.getElementById('fav-badge');
  if (count > 0) { badge.style.display = 'inline'; badge.textContent = count; }
  else { badge.style.display = 'none'; }
}

function scrollToTop() {
  document.getElementById('resto-grid').parentElement.scrollTop = 0;
}

// ====== BUILD RANDOM FILTERS ======
function buildRandomFilters() {
  const cuisine = document.getElementById('random-cuisine');
  const groups = [...new Set(RESTAURANTS.map(r => getCuisineGroup(r.category)))];
  cuisine.innerHTML = '<option value="all">不限菜系</option>' +
    groups.map(g => `<option value="${g}">${g}</option>`).join('');

  const area = document.getElementById('random-area');
  const areas = [...new Set(RESTAURANTS.map(r => r.location_area))].sort();
  area.innerHTML = '<option value="all">不限区域</option>' +
    areas.map(a => `<option value="${a}">${a}</option>`).join('');

  const price = document.getElementById('random-price');
  price.innerHTML = `
    <option value="all">不限价位</option>
    <option value="0-50">50元以下</option>
    <option value="50-100">50~100元</option>
    <option value="100-200">100~200元</option>
    <option value="200+">200元以上</option>`;
}

// ====== INIT ======
function init() {
  buildFilterChips();
  buildFilterDropdown();
  buildRandomFilters();
  renderMenu();
  renderFavorites();
  renderHistory();
  updateFavBadge();
  updateRandomBtn();
}

document.addEventListener('DOMContentLoaded', init);
</script>
