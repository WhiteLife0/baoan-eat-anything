<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天吃什么 🐷</title>
<style>
:root { --pink:#FFD1DC;--blush:#F4B8C8;--nose:#E8A0B4;--light:#FFF5F5;--bg:#FFFAFA;--dark:#444;--grey:#999;--w:#fff;--sh:0 2px 12px rgba(244,184,200,.18);--heart:#E06080 }

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--dark); min-height:100vh; }
#app { max-width:480px; margin:0 auto; min-height:100vh; }

/* Header */
.hd { text-align:center; padding:16px 16px 6px; background:linear-gradient(180deg,var(--light)0%,var(--bg)100%); position:relative; overflow:hidden; }
.hd::before { content:''; position:absolute; top:10px; left:20px; width:40px; height:40px; background:radial-gradient(circle,#FFD1DC,transparent 70%); border-radius:50%; opacity:.5; animation:float 3s ease-in-out infinite; }
.hd::after { content:''; position:absolute; top:30px; right:15px; width:30px; height:30px; background:radial-gradient(circle,#F4B8C8,transparent 70%); border-radius:50%; opacity:.4; animation:float 4s ease-in-out infinite 1s; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.lulu-svg { width:70px; height:70px; margin:0 auto 6px; }
.app-name { font-size:22px; font-weight:700; color:var(--heart); letter-spacing:2px; }
.app-sub { font-size:11px; color:#bbb; margin-top:2px; }

/* Stars BG */
.floating-stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:-1; }
.floating-stars span { position:absolute; display:block; animation:twinkle 2s ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:.3;transform:scale(1)} 50%{opacity:.8;transform:scale(1.3)} }

/* Nav */
.nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; display:flex; background:var(--w); border-top:1px solid #fce8ec; padding:5px 0 8px; z-index:999; box-shadow:0 -2px 8px rgba(0,0,0,.04); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:4px 0; cursor:pointer; color:#ccc; font-size:10px; font-weight:600; user-select:none; -webkit-user-select:none; transition:color .15s; }
.nav-item.active { color:#E06080; }
.nav-icon { font-size:20px; line-height:1; margin-bottom:2px; position:relative; }
.nav-badge { position:absolute; top:-4px; right:-12px; background:#ff6b8a; color:white; font-size:9px; width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; }

/* Pages */
.page { display:none; padding:12px 16px 100px; animation:fadeIn .25s ease; }
.page.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* Home page */
.sec { margin-bottom:18px; }
.sec-title { font-size:15px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:6px; color:var(--dark); }
.feat-scroll { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
.feat-scroll::-webkit-scrollbar { display:none; }
.feat-card { flex:0 0 auto; width:160px; background:var(--w); border-radius:16px; padding:12px; box-shadow:var(--sh); border:1px solid #fce8ec; cursor:pointer; transition:transform .15s; }
.feat-card:active { transform:scale(.97); }
.feat-card .fc-name { font-size:13px; font-weight:600; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.feat-card .fc-tag { display:inline-block; background:var(--light); color:var(--heart); font-size:10px; padding:2px 7px; border-radius:6px; margin-bottom:4px; }
.feat-card .fc-rating { font-size:11px; color:#E07050; }
.quick-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--w); border-radius:12px; margin-bottom:6px; box-shadow:var(--sh); cursor:pointer; transition:background .15s; }
.quick-item:active { background:#fff5f7; }
.qi-emoji { font-size:22px; flex-shrink:0; }
.qi-text { flex:1; min-width:0; }
.qi-name { font-size:13px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.qi-meta { font-size:10px; color:var(--grey); }

/* Menu page */
.fbar { margin-bottom:10px; }
.fscroll { display:flex; gap:6px; overflow-x:auto; padding:4px 0 8px; scrollbar-width:none; }
.fscroll::-webkit-scrollbar { display:none; }
.chip { flex-shrink:0; padding:6px 14px; border-radius:18px; border:1.5px solid #f0d0d0; background:var(--w); color:#666; font-size:12px; cursor:pointer; white-space:nowrap; transition:all .2s; user-select:none; }
.chip.active { background:var(--pink); border-color:var(--pink); color:white; font-weight:600; box-shadow:0 3px 10px rgba(244,184,200,.35); }
.swrap { display:flex; align-items:center; background:var(--light); border-radius:22px; padding:9px 14px; margin-bottom:10px; border:1.5px solid #fce8ec; }
.swrap input { flex:1; border:none; background:none; outline:none; font-size:13px; color:var(--dark); }
.swrap .si { margin-right:8px; }
.card-list { display:flex; flex-direction:column; gap:10px; }
.card { background:var(--w); border-radius:18px; padding:12px 14px; box-shadow:var(--sh); border:1px solid #fce8ec; cursor:pointer; transition:transform .15s; }
.card:active { transform:scale(.98); }
.card.hated { opacity:.4; }
.card-top { display:flex; justify-content:space-between; margin-bottom:5px; }
.card-name { font-size:14px; font-weight:600; flex:1; }
.card-rating { font-size:11px; color:#E07050; flex-shrink:0; }
.card-tags { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:5px; }
.card-tag { font-size:10px; padding:2px 7px; border-radius:7px; background:var(--light); color:#999; border:1px solid #fce8ec; }
.card-tag.cui { background:var(--light); color:var(--heart); border-color:var(--pink); }
.card-rec { font-size:12px; color:#999; margin-bottom:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.card-acts { display:flex; gap:8px; }
.btn { flex:1; padding:7px 0; border-radius:12px; border:1.5px solid #f0d0d0; background:var(--w); font-size:11px; color:#999; cursor:pointer; text-align:center; transition:all .15s; user-select:none; }
.btn:active { background:#f5f5f5; }
.btn.faved { background:#fff0f3; border-color:var(--pink); color:var(--heart); }
.btn.go { background:var(--pink); border-color:var(--pink); color:white; font-weight:600; }

/* Modal */
.modal-bg { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.45); z-index:1000; justify-content:center; align-items:flex-end; }
.modal-bg.show { display:flex; }
.modal { background:var(--w); border-radius:24px 24px 0 0; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; padding:20px 16px 40px; animation:slideUp .3s ease; box-shadow:0 -4px 20px rgba(0,0,0,.1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-close { font-size:24px; color:#ccc; cursor:pointer; float:right; margin:-4px -4px 0 0; }
.modal-name { font-size:20px; font-weight:700; margin-bottom:6px; }
.modal-info { font-size:12px; color:var(--grey); margin-bottom:12px; line-height:1.6; }
.modal-dish { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid #fef0f0; }
.modal-dish:last-child { border:none; }
.dish-emoji { font-size:32px; flex-shrink:0; width:44px; text-align:center; }
.dish-info { flex:1; }
.dish-name { font-size:14px; font-weight:600; margin-bottom:2px; }
.dish-desc { font-size:12px; color:var(--grey); line-height:1.4; margin-bottom:4px; }
.dish-meta { font-size:11px; color:#bbb; display:flex; gap:10px; }
.stars { color:#ffb300; }
.modal-addr { background:var(--light); border-radius:12px; padding:10px 14px; margin-bottom:12px; font-size:13px; color:#666; }
.modal-addr .addr-label { font-weight:600; color:var(--heart); margin-bottom:4px; }
.modal-hours { font-size:12px; color:#bbb; margin-bottom:12px; }

/* Random */
.rctrls { background:var(--w); border-radius:18px; padding:12px 14px; box-shadow:var(--sh); border:1px solid #fce8ec; margin-bottom:14px; }
.rsel { display:flex; flex-direction:column; gap:5px; margin-top:6px; }
.rsel select { padding:8px 12px; border-radius:12px; border:1.5px solid #f0d0d0; background:var(--w); font-size:13px; outline:none; width:100%; -webkit-appearance:none; }
.rand-card { background:linear-gradient(135deg,var(--light)0%,white 100%); border-radius:20px; padding:44px 20px; text-align:center; box-shadow:var(--sh); border:2px dashed var(--pink); cursor:pointer; }
.rand-card:active { transform:scale(.97); }
.rand-q { font-size:19px; font-weight:700; color:var(--heart); margin-bottom:20px; }
.rand-btn { display:inline-block; background:linear-gradient(135deg,var(--pink)0%,var(--blush)100%); color:white; font-size:17px; font-weight:700; padding:13px 36px; border-radius:28px; cursor:pointer; box-shadow:0 4px 14px rgba(244,184,200,.4); }
.rand-btn:active { transform:scale(.95); }

.result-box { background:var(--w); border-radius:20px; padding:22px 18px; text-align:center; box-shadow:var(--sh); animation:pop .3s; }
@keyframes pop { 0%{transform:scale(.8);opacity:0} 100%{transform:scale(1);opacity:1} }
.r-rtags { display:flex; justify-content:center; gap:5px; flex-wrap:wrap; margin:8px 0; }
.rbtns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:14px; }
.rbtn { padding:7px 16px; border-radius:18px; font-size:12px; cursor:pointer; border:1.5px solid #f0d0d0; background:var(--w); color:#999; user-select:none; }
.rbtn:active { background:#f5f5f5; }
.rbtn.again { background:var(--pink); border-color:var(--pink); color:white; }

.recent { margin-top:14px; }
.rec-title { font-size:13px; font-weight:600; color:#bbb; margin-bottom:8px; }
.rec-item { background:var(--w); border-radius:10px; padding:8px 12px; margin-bottom:4px; font-size:13px; cursor:pointer; }
.rec-item:active { background:#fff5f7; }

/* Rating modal */
.rating-modal { text-align:center; padding:20px; }
.rating-stars { font-size:36px; margin:16px 0; cursor:pointer; display:flex; justify-content:center; gap:4px; }
.rating-stars .rstar { transition:transform .15s; }
.rating-stars .rstar:hover,.rating-stars .rstar.active { transform:scale(1.2); }
.rating-actions { display:flex; gap:8px; justify-content:center; margin-top:12px; }

/* Favorites & History */
.sec-header { font-size:16px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.badge { background:var(--pink); color:white; font-size:10px; padding:1px 8px; border-radius:10px; font-weight:700; }
.empty { text-align:center; padding:60px 20px; }
.empty-emoji { font-size:52px; margin-bottom:10px; }
.empty-text { font-size:14px; color:#ccc; }
.stats-box { display:flex; gap:8px; margin-bottom:10px; }
.stat { flex:1; background:var(--w); border-radius:14px; padding:12px; text-align:center; box-shadow:var(--sh); }
.stat-num { font-size:22px; font-weight:700; color:var(--heart); display:block; }
.stat-label { font-size:11px; color:var(--grey); }
.h-item { background:var(--w); border-radius:14px; padding:10px 14px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 1px 4px rgba(0,0,0,.04); }
.h-info { flex:1; min-width:0; }
.h-name { font-size:14px; font-weight:600; }
.h-meta { font-size:11px; color:#bbb; margin-top:2px; }
.h-right { text-align:right; flex-shrink:0; margin-left:8px; }
.h-time { font-size:10px; color:#ddd; }
.h-rate { color:#ffb300; font-size:11px; }
.h-del { color:#ccc; font-size:16px; cursor:pointer; padding:4px; }

/* Battle Game */
.battle-setup { background:var(--w); border-radius:18px; padding:16px; box-shadow:var(--sh); }
.battle-step { margin-bottom:14px; }
.battle-step-title { font-size:14px; font-weight:700; color:var(--heart); margin-bottom:8px; }
.battle-picks { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
.battle-pick { background:var(--light); border:1.5px solid #f0d0d0; border-radius:10px; padding:6px 10px; font-size:12px; cursor:pointer; user-select:none; transition:all .15s; }
.battle-pick.selected { background:var(--pink); border-color:var(--pink); color:white; font-weight:600; }
.battle-search-input { width:100%; padding:8px 12px; border-radius:10px; border:1.5px solid #f0d0d0; font-size:13px; outline:none; }
.battle-search-results { max-height:140px; overflow-y:auto; margin-top:4px; }
.battle-search-results div { padding:6px 10px; cursor:pointer; font-size:12px; border-bottom:1px solid #fef0f0; }
.battle-search-results div:active { background:var(--light); }
.battle-btn { background:linear-gradient(135deg,var(--pink),var(--blush)); color:white; border:none; padding:10px 24px; border-radius:20px; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; }
.battle-result { margin-top:12px; }
.rps-btns { display:flex; gap:10px; justify-content:center; margin:12px 0; }
.rps-btn { width:60px; height:60px; border-radius:50%; border:2px solid var(--pink); background:var(--w); font-size:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.rps-btn:active { background:var(--light); }

/* Toast */
.toast { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); background:var(--dark); color:white; padding:8px 22px; border-radius:20px; font-size:12px; z-index:9999; animation:ti 2s forwards; pointer-events:none; white-space:nowrap; }
@keyframes ti { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 75%{opacity:1} 100%{opacity:0;transform:translateX(-50%) translateY(-10px)} }
</style>
</head>
<body>

<div id="app">
  <header class="hd">
    <svg viewBox="0 0 80 80" class="lulu-svg">
      <ellipse cx="40" cy="66" rx="34" ry="14" fill="#FFF5F5" stroke="#F4B8C8" stroke-width="1"/>
      <ellipse cx="22" cy="16" rx="10" ry="8" fill="#FFD1DC"/>
      <ellipse cx="58" cy="16" rx="10" ry="8" fill="#FFD1DC"/>
      <ellipse cx="22" cy="18" rx="5" ry="4" fill="#F4B8C8"/>
      <ellipse cx="58" cy="18" rx="5" ry="4" fill="#F4B8C8"/>
      <circle cx="40" cy="42" r="22" fill="#FFD1DC"/>
      <circle cx="32" cy="38" r="2.5" fill="#333"/>
      <circle cx="48" cy="38" r="2.5" fill="#333"/>
      <ellipse cx="40" cy="46" rx="6" ry="4.5" fill="#E8A0B4"/>
      <ellipse cx="38" cy="44" rx="2" ry="1.2" fill="white" opacity=".5"/>
      <path d="M36 52 Q40 55 44 52" stroke="#E8A0B4" stroke-width="1.2" fill="none"/>
      <circle cx="28" cy="46" r="5" fill="#F4B8C8" opacity=".5"/>
      <circle cx="52" cy="46" r="5" fill="#F4B8C8" opacity=".5"/>
    </svg>
    <div class="app-name">今天吃什么</div>
    <div class="app-sub">深圳 · 宝安区美食指南 · 278家</div>
  </header>

  <!-- ========== HOME ========== -->
  <div id="pg-home" class="page active">
    <div class="sec" id="sec-feat"><div class="sec-title">🎲 随机推荐</div><div class="feat-scroll" id="feat-g"></div></div>
    <div class="sec" id="sec-favs"><div class="sec-title">❤️ 我的珍藏</div><div id="fav-quick"></div></div>
    <div class="sec" id="sec-hist"><div class="sec-title">📋 最近吃过</div><div id="hist-quick"></div></div>
    <div class="sec" id="sec-rated"><div class="sec-title">⭐ 高分推荐</div><div id="top-rated"></div></div>
  </div>

  <!-- ========== MENU ========== -->
  <div id="pg-menu" class="page">
    <div class="fbar"><div class="fscroll" id="fscroll"></div></div>
    <div class="swrap"><span class="si">🔍</span><input type="text" id="srch" placeholder="搜索餐厅..." oninput="srch()"></div>
    <div class="card-list" id="mlist"></div>
  </div>

  <!-- ========== RANDOM ========== -->
  <div id="pg-random" class="page">
    <div class="rctrls">
      <div style="font-size:13px;font-weight:600;color:var(--heart)">🎯 限定范围</div>
      <div class="rsel">
        <select id="rc" onchange="upRcnt()"><option value="all">不限菜系</option></select>
        <select id="ra" onchange="upRcnt()"><option value="all">不限区域</option></select>
      </div>
      <div style="text-align:center;font-size:12px;color:#bbb;margin-top:8px" id="rinfo"></div>
    </div>
    <div class="rand-card" id="rcard" onclick="doR()">
      <div class="rand-q">今天想吃什么呢？</div>
      <div class="rand-btn" onclick="event.stopPropagation();doR()">🎲 摇一个！</div>
      <div style="font-size:11px;color:#ccc;margin-top:12px">戳 lulu 也可以摇哦~</div>
    </div>
    <div class="result-box" id="rbox" style="display:none">
      <div style="font-size:20px;font-weight:700;margin-bottom:6px" id="rn"></div>
      <div class="r-rtags" id="rt"></div>
      <div style="font-size:13px;color:#999;margin-bottom:14px" id="rd"></div>
      <div class="rbtns">
        <button class="rbtn" onclick="rFav()" id="rFavBtn">❤️ 收藏</button>
        <button class="rbtn" onclick="rHate()">💔 踩雷</button>
        <button class="rbtn again" onclick="doR()">🎲 再来</button>
      </div>
    </div>
    <div class="recent"><div class="rec-title">🕐 刚刚摇过</div><div id="rlist"></div></div>
  </div>

  <!-- ========== FAVS ========== -->
  <div id="pg-favs" class="page">
    <div class="sec-header">❤️ 收藏夹 <span class="badge" id="fb">0</span></div>
    <div class="card-list" id="flist"></div>
    <div class="empty" id="fempty"><div class="empty-emoji">😴</div><div class="empty-text">还没有收藏哦~</div></div>
  </div>

  <!-- ========== HISTORY ========== -->
  <div id="pg-hist" class="page">
    <div class="sec-header">📋 点餐记录 <span class="badge" id="hb">0</span></div>
    <div class="empty" id="hempty"><div class="empty-emoji">🍽️</div><div class="empty-text">还没有记录~</div></div>
    <div id="hstats"></div>
    <div id="hlist"></div>
    <div class="stats-box" id="hstats-box"></div>
  </div>

  <!-- ========== BATTLE ========== -->
  <div id="pg-battle" class="page">
    <div class="sec-header">⚔️ 双人对战</div>
    <div class="battle-setup" id="battle-area">
      <p style="font-size:13px;color:#666;margin-bottom:12px">你和老婆各选5家店，系统比较菜系，同菜系用剪刀石头布决胜负！</p>
      <div class="battle-step" id="bs-p1">
        <div class="battle-step-title">👨 你的选择 (5家)</div>
        <div class="battle-picks" id="bp1"></div>
        <input class="battle-search-input" placeholder="搜索添加餐厅..." oninput="bSearch(this.value,'p1')" id="bsi1">
        <div class="battle-search-results" id="bsr1"></div>
      </div>
      <div class="battle-step" id="bs-p2">
        <div class="battle-step-title">👩 老婆的选择 (5家)</div>
        <div class="battle-picks" id="bp2"></div>
        <input class="battle-search-input" placeholder="搜索添加餐厅..." oninput="bSearch(this.value,'p2')" id="bsi2">
        <div class="battle-search-results" id="bsr2"></div>
      </div>
      <button class="battle-btn" onclick="bFight()">⚔️ 开始对战！</button>
      <div class="battle-result" id="bresult"></div>
    </div>
  </div>
</div>

<nav class="nav">
  <div class="nav-item active" data-p="home" onclick="go('home')"><div class="nav-icon">🏠</div>首页</div>
  <div class="nav-item" data-p="menu" onclick="go('menu')"><div class="nav-icon">🍽️</div>菜单</div>
  <div class="nav-item" data-p="random" onclick="go('random')"><div class="nav-icon">🎲</div>随机</div>
  <div class="nav-item" data-p="battle" onclick="go('battle')"><div class="nav-icon">⚔️</div>对战</div>
  <div class="nav-item" data-p="favs" onclick="go('favs')"><div class="nav-icon">❤️</div>收藏</div>
</nav>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

function gOf(r) { for(let g of GROUPS) if(g.f(r.category)) return g.n; return '🍢 其他'; }

// ===================== STORAGE =====================
function gf() { try{return JSON.parse(localStorage._f||'[]')}catch{return[]} }
function sf(v) { localStorage._f=JSON.stringify(v); }
function gh() { try{return JSON.parse(localStorage._h||'[]')}catch{return[]} }
function sh(v) { localStorage._h=JSON.stringify(v); }
function gr() { try{return JSON.parse(localStorage._r||'{}')}catch{return{}} }
function sr(v) { localStorage._r=JSON.stringify(v); }

function isF(n) { return gf().includes(n); }
function isH(n) { return gh().includes(n); }
function tF(n) { let f=gf(); let w=f.includes(n); if(w) f=f.filter(x=>x!==n); else f.unshift(n); sf(f); return !w; }
function tH(n) { let h=gh(); let w=h.includes(n); if(w) h=h.filter(x=>x!==n); else h.unshift(n); sh(h); return !w; }

function addH(r) {
  let h=gh(); h=h.filter(x=>x.name!==r.name);
  h.unshift({name:r.name,cat:r.category,area:r.location_area,rating:r.rating,price:r.price_range,time:new Date().toLocaleString('zh-CN'),rated:false});
  if(h.length>200) h=h.slice(0,200); sh(h);
}

function delH(idx) {
  let h=gh(); h.splice(idx,1); sh(h); renderHist(); renderHome();
}

function rateH(idx, score) {
  let h=gh(); if(idx>=h.length) return;
  h[idx].rated=true; h[idx].score=score; sh(h);
  let ratings=gr(); ratings[h[idx].name]=score; sr(ratings);
  renderHist(); renderHome();
}

// ===================== TOAST =====================
function t(msg) {
  let el=document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.body.appendChild(el); setTimeout(()=>el.remove(),2100);
}

// ===================== NAV =====================
let cp='home';
function go(p) {
  cp=p;
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  let pg=document.getElementById('pg-'+p); if(pg) pg.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  let nv=document.querySelector('.nav-item[data-p="'+p+'"]'); if(nv) nv.classList.add('active');
  window.scrollTo(0,0);
  if(p==='home') renderHome();
  else if(p==='menu') renderMenu();
  else if(p==='random') upRcnt();
  else if(p==='favs') renderFavs();
  else if(p==='hist') renderHist();
}

// ===================== HOME =====================
function renderHome() {
  let hates=gh(), pool=DATA.filter(r=>!hates.includes(r.name));
  let feat=[...pool].sort(()=>Math.random()-.5).slice(0,8);
  document.getElementById('feat-g').innerHTML=feat.map(r=>
    `<div class="feat-card" onclick="showDetail('${r.name.replace(/'/g,"\\'")}')">
      <div class="fc-name">${r.name}</div>
      <div class="fc-tag">${gOf(r)}</div>
      <div class="fc-rating">⭐ ${r.rating}</div>
    </div>`
  ).join('');

  // Quick favs
  let favs=gf(), fq=document.getElementById('fav-quick'), fs=document.getElementById('sec-favs');
  if(favs.length===0) fs.style.display='none';
  else { fs.style.display='block'; fq.innerHTML=favs.slice(0,5).map(n=>{let r=DATA.find(x=>x.name===n);if(!r)return'';return`<div class="quick-item" onclick="showDetail('${r.name.replace(/'/g,"\\'")}')"><span class="qi-emoji">❤️</span><div class="qi-text"><div class="qi-name">${r.name}</div><div class="qi-meta">${gOf(r)} · ⭐${r.rating}</div></div></div>`}).join(''); }

  // Quick history
  let hist=gh(), hq=document.getElementById('hist-quick'), hs=document.getElementById('sec-hist');
  if(hist.length===0) hs.style.display='none';
  else { hs.style.display='block'; hq.innerHTML=hist.slice(0,5).map((h,i)=>{let r=DATA.find(x=>x.name===h.name);return`<div class="quick-item" onclick="showDetail('${h.name.replace(/'/g,"\\'")}')"><span class="qi-emoji">${h.rated?'⭐':'🍽️'}</span><div class="qi-text"><div class="qi-name">${h.name}${h.score?` · ${'⭐'.repeat(h.score)}`:''}</div><div class="qi-meta">${h.time}</div></div><span style="color:#ccc;font-size:16px;padding:4px" onclick="event.stopPropagation();delH(${i});t('已删除')">✕</span></div>`}).join(''); }

  // Top rated
  let rt=gr(), rated=Object.entries(rt).filter(([_,s])=>s>=4).sort((a,b)=>b[1]-a[1]).slice(0,6);
  let tr=document.getElementById('top-rated'), ts=document.getElementById('sec-rated');
  if(rated.length===0) ts.style.display='none';
  else { ts.style.display='block'; tr.innerHTML=rated.map(([n,s])=>{let r=DATA.find(x=>x.name===n);if(!r)return'';return`<div class="quick-item" onclick="showDetail('${r.name.replace(/'/g,"\\'")}')"><span class="qi-emoji">${'⭐'.repeat(s)}</span><div class="qi-text"><div class="qi-name">${r.name}</div><div class="qi-meta">${gOf(r)} · 评分${s}</div></div></div>`}).join(''); }
}

// ===================== MENU =====================
let mCuisine='all', mSearch='';

function buildChips() {
  let uniq=[...new Set(DATA.map(r=>gOf(r)))];
  let sc=document.getElementById('fscroll');
  sc.innerHTML='<span class="chip active" onclick="setMC(\'all\')">🍽️ 全部</span>'+uniq.map(g=>`<span class="chip" onclick="setMC('${g}')">${g}</span>`).join('');
}

function setMC(c) {
  mCuisine=c;
  document.querySelectorAll('#fscroll .chip').forEach(ch=>ch.classList.toggle('active',ch.textContent.trim()===c||(c==='all'&&ch.textContent.includes('全部'))));
  renderMenu();
}

function srch() { mSearch=document.getElementById('srch').value; renderMenu(); }

function renderMenu() {
  let list=DATA;
  if(mCuisine!=='all') list=list.filter(r=>gOf(r)===mCuisine);
  if(mSearch) list=list.filter(r=>r.name.includes(mSearch));
  let cl=document.getElementById('mlist');
  if(list.length===0){cl.innerHTML='<div class="empty"><div class="empty-emoji">😅</div><div class="empty-text">没找到</div></div>';return;}
  cl.innerHTML=list.map(r=>{
    let f=isF(r.name), h=isH(r.name);
    return`<div class="card ${h?'hated':''}" onclick="showDetail('${r.name.replace(/'/g,"\\'")}')">
      <div class="card-top"><span class="card-name">${r.name}</span><span class="card-rating">⭐${r.rating}</span></div>
      <div class="card-tags"><span class="card-tag cui">${gOf(r)}</span><span class="card-tag">${r.price_range}元</span><span class="card-tag">${r.location_area}</span></div>
      <div class="card-rec">💡 ${r.recommend}</div>
      <div class="card-acts" onclick="event.stopPropagation()">
        <button class="btn ${f?'faved':''}" onclick="tF('${r.name.replace(/'/g,"\\'")}');renderMenu();renderHome();t(f?'已取消收藏':'❤️ 已收藏')">${f?'❤️':'🤍'} ${f?'已收藏':'收藏'}</button>
        <button class="btn" onclick="tH('${r.name.replace(/'/g,"\\'")}');renderMenu();t(h?'已取消踩雷':'💔 已踩雷')">${h?'💔':'🤍'} ${h?'已踩':'踩雷'}</button>
        <button class="btn go" onclick="addH(DATA.find(x=>x.name==='${r.name.replace(/'/g,"\\'")}'));t('🍽️ 已记录');renderHome()">🍽️ 就吃</button>
      </div>
    </div>`;
  }).join('');
}

function showDetail(name) {
  let r=DATA.find(x=>x.name===name); if(!r) return;
  let m=document.getElementById('modal');
  let dishesHTML=(r.dishes||[]).map(d=>{
    let dishesEmojis={'虾':'🦐','鱼':'🐟','蟹':'🦀','鸡':'🍗','牛':'🥩','猪':'🐷','羊':'🐑','鸭':'🦆','面':'🍜','饭':'🍚','汤':'🍲','菜':'🥬','蛋':'🥚','豆腐':'🧈','虾饺':'🥟','烧卖':'🥟','肠粉':'🫔','寿司':'🍣','拉面':'🍜','披萨':'🍕','汉堡':'🍔','薯条':'🍟','甜品':'🍰','面包':'🍞','咖啡':'☕','奶茶':'🧋','火锅':'🍲','烤':'🔥','蒸':'♨️','炒':'🍳','炸':'🍤','酸':''};
    let emoji='🍽️';
    for(let[k,v]of Object.entries(dishesEmojis)) if(d.name.includes(k)||d.desc.includes(k)){emoji=v;break}
    return`<div class="modal-dish"><div class="dish-emoji">${emoji}</div><div class="dish-info"><div class="dish-name">${d.name}</div><div class="dish-desc">${d.desc}</div><div class="dish-meta"><span>${d.price}元</span><span class="stars">★ ${d.rating}</span></div></div></div>`;
  }).join('');

  m.innerHTML=`
    <span class="modal-close" onclick="closeModal()">✕</span>
    <div class="modal-name">${r.name}</div>
    <div class="modal-info"><span style="color:var(--heart);font-weight:600">${gOf(r)}</span> · ${r.price_range}元/人 · ⭐${r.rating}<br>${r.recommend}</div>
    <div class="modal-addr"><div class="addr-label">📍 地址</div>${r.address||'宝安区'}<br><span style="font-size:12px;color:#bbb">⏰ ${r.hours||'营业时间请电话确认'}</span></div>
    <div style="font-weight:600;color:var(--heart);margin-bottom:8px">🍽️ 招牌菜 (${(r.dishes||[]).length}道)</div>
    ${dishesHTML}
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn ${isF(r.name)?'faved':''}" style="flex:1" onclick="tF('${r.name.replace(/'/g,"\\'")}');renderMenu();renderHome();closeModal()">${isF(r.name)?'❤️':'🤍'} ${isF(r.name)?'取消':'收藏'}</button>
      <button class="btn go" style="flex:1" onclick="addH(DATA.find(x=>x.name==='${r.name.replace(/'/g,"\\'")}'));t('已记录');closeModal();renderHome()">🍽️ 就吃这个</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('show');
}

function closeModal() { document.getElementById('modal-bg').classList.remove('show'); }

// ===================== RANDOM =====================
let rRes=null, rRecent=[];
function upRcnt() {
  let p=getRP(); document.getElementById('rinfo').textContent=`可在 ${p.length} 家中随机`;
}
function getRP() {
  let p=[...DATA].filter(r=>!isH(r.name));
  let c=document.getElementById('rc').value, a=document.getElementById('ra').value;
  if(c!=='all') p=p.filter(r=>gOf(r)===c);
  if(a!=='all') p=p.filter(r=>r.location_area===a);
  return p;
}
function doR() {
  let p=getRP(); if(p.length===0){t('都踩雷了！');return;}
  let r=p[Math.floor(Math.random()*p.length)]; rRes=r; addH(r);
  document.getElementById('rcard').style.display='none';
  let rb=document.getElementById('rbox'); rb.style.display='block';
  document.getElementById('rn').textContent=r.name;
  document.getElementById('rt').innerHTML=`<span class="card-tag cui">${gOf(r)}</span><span class="card-tag">${r.price_range}元</span><span class="card-tag">${r.location_area}</span><span class="card-tag">⭐${r.rating}</span>`;
  document.getElementById('rd').textContent='💡 '+r.recommend;
  document.getElementById('rFavBtn').textContent=isF(r.name)?'❤️ 已收藏':'🤍 收藏';
  rRecent=rRecent.filter(x=>x.name!==r.name); rRecent.unshift(r); if(rRecent.length>8) rRecent=rRecent.slice(0,8);
  renderRRecent(); renderHome();
}
function rFav() { if(!rRes)return; tF(rRes.name); document.getElementById('rFavBtn').textContent=isF(rRes.name)?'❤️ 已收藏':'🤍 收藏'; renderHome(); }
function rHate() { if(!rRes)return; tH(rRes.name); document.getElementById('rcard').style.display='block'; document.getElementById('rbox').style.display='none'; renderHome(); }
function renderRRecent() { document.getElementById('rlist').innerHTML=rRecent.map(r=>`<div class="rec-item" onclick="reselect('${r.name.replace(/'/g,"\\'")}')">${r.name} · ${gOf(r)} · ⭐${r.rating}</div>`).join(''); }
function reselect(nm) { let r=DATA.find(x=>x.name===nm); if(!r)return; rRes=r; document.getElementById('rcard').style.display='none'; document.getElementById('rbox').style.display='block'; document.getElementById('rn').textContent=r.name; document.getElementById('rt').innerHTML=`<span class="card-tag cui">${gOf(r)}</span><span class="card-tag">${r.price_range}元</span><span class="card-tag">${r.location_area}</span><span class="card-tag">⭐${r.rating}</span>`; document.getElementById('rd').textContent='💡 '+r.recommend; }

// ===================== FAVS =====================
function renderFavs() {
  let f=gf(); document.getElementById('fb').textContent=f.length;
  let fl=document.getElementById('flist'), fe=document.getElementById('fempty');
  if(f.length===0){fl.innerHTML='';fe.style.display='block';return;} fe.style.display='none';
  fl.innerHTML=f.map(n=>{let r=DATA.find(x=>x.name===n);if(!r)return'';return`<div class="card" onclick="showDetail('${r.name.replace(/'/g,"\\'")}')"><div class="card-top"><span class="card-name">${r.name}</span><span class="card-rating">⭐${r.rating}</span></div><div class="card-tags"><span class="card-tag cui">${gOf(r)}</span><span class="card-tag">${r.price_range}元</span><span class="card-tag">${r.location_area}</span></div><div class="card-rec">💡 ${r.recommend}</div><div class="card-acts" onclick="event.stopPropagation()"><button class="btn faved" onclick="tF('${r.name.replace(/'/g,"\\'")}');renderFavs();renderHome()">❤️ 取消</button><button class="btn go" onclick="addH(DATA.find(x=>x.name==='${r.name.replace(/'/g,"\\'")}'));t('已记录');renderHome()">🍽️ 就吃</button></div></div>`}).join('');
}

// ===================== HISTORY =====================
function renderHist() {
  let h=gh(); document.getElementById('hb').textContent=h.length;
  let he=document.getElementById('hempty'), hl=document.getElementById('hlist'), hs=document.getElementById('hstats-box');
  if(h.length===0){he.style.display='block';hl.innerHTML='';hs.innerHTML='';return;} he.style.display='none';
  let unique=new Set(h.map(x=>x.name)).size;
  hs.innerHTML=`<div class="stat"><span class="stat-num">${h.length}</span><div class="stat-label">次点餐</div></div><div class="stat"><span class="stat-num">${unique}</span><div class="stat-label">家餐厅</div></div><div class="stat"><span class="stat-num">${h.filter(x=>x.rated).length}</span><div class="stat-label">已评分</div></div>`;
  hl.innerHTML=h.map((item,i)=>`
    <div class="h-item">
      <div class="h-info">
        <div class="h-name" style="cursor:pointer" onclick="showDetail('${item.name.replace(/'/g,"\\'")}')">${item.name}</div>
        <div class="h-meta">${item.area} · ${item.time}</div>
        ${item.rated?`<div class="h-rate">评分: ${'⭐'.repeat(item.score)}</div>`:''}
      </div>
      <div class="h-right">
        <div class="h-time">${item.time.split(' ')[0]}</div>
        <div style="display:flex;align-items:center;gap:2px">
          ${!item.rated?`<span style="cursor:pointer;font-size:13px" onclick="showRateModal(${i})">📝 评分</span>`:`<span class="h-rate">${'★'.repeat(item.score)}</span>`}
          <span class="h-del" onclick="delH(${i})" title="删除">✕</span>
        </div>
      </div>
    </div>
  `).join('');
}

function showRateModal(idx) {
  let h=gh(); if(idx>=h.length) return;
  let m=document.getElementById('modal');
  m.innerHTML=`
    <span class="modal-close" onclick="closeModal()">✕</span>
    <div class="rating-modal">
      <div style="font-size:18px;font-weight:600">给 ${h[idx].name} 打分</div>
      <div style="font-size:13px;color:#999;margin-top:4px">吃完感觉怎么样？</div>
      <div class="rating-stars" id="rate-stars">
        <span class="rstar" onclick="setRate(${idx},1)">⭐</span>
        <span class="rstar" onclick="setRate(${idx},2)">⭐</span>
        <span class="rstar" onclick="setRate(${idx},3)">⭐</span>
        <span class="rstar" onclick="setRate(${idx},4)">⭐</span>
        <span class="rstar" onclick="setRate(${idx},5)">⭐</span>
      </div>
      <div style="font-size:12px;color:#bbb">选择星级后自动保存</div>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('show');
}

function setRate(idx,score) {
  rateH(idx,score); closeModal(); t('⭐ 已评分！');
}

// ===================== BATTLE =====================
let bp1=[], bp2=[];
function bSearch(q, player) {
  if(!q||q.length<1) { document.getElementById('bsr'+(player==='p1'?'1':'2')).innerHTML=''; return; }
  let results=DATA.filter(r=>r.name.includes(q)&&!bp1.includes(r.name)&&!bp2.includes(r.name)).slice(0,6);
  let id=player==='p1'?'1':'2';
  document.getElementById('bsr'+id).innerHTML=results.map(r=>`<div onclick="bAdd('${player}','${r.name.replace(/'/g,"\\'")}')">${r.name} · ${gOf(r)}</div>`).join('');
}

function bAdd(player, name) {
  let arr=player==='p1'?bp1:bp2;
  if(arr.length>=5) { t('最多选5家！'); return; }
  if(arr.includes(name)) { t('已选过了'); return; }
  arr.push(name);
  renderBPicks();
  document.getElementById('bsr'+(player==='p1'?'1':'2')).innerHTML='';
  document.getElementById('bsi'+(player==='p1'?'1':'2')).value='';
}

function bRemove(player, name) {
  if(player==='p1') bp1=bp1.filter(x=>x!==name);
  else bp2=bp2.filter(x=>x!==name);
  renderBPicks();
}

function renderBPicks() {
  document.getElementById('bp1').innerHTML=bp1.map(n=>`<span class="battle-pick selected" onclick="bRemove('p1','${n.replace(/'/g,"\\'")}')">${n} ✕</span>`).join('');
  document.getElementById('bp2').innerHTML=bp2.map(n=>`<span class="battle-pick selected" onclick="bRemove('p2','${n.replace(/'/g,"\\'")}')">${n} ✕</span>`).join('');
}

function bFight() {
  if(bp1.length!==5||bp2.length!==5) { t('双方都要选满5家！'); return; }

  // Compare by category groups
  let p1rs=bp1.map(n=>DATA.find(x=>x.name===n)).filter(Boolean);
  let p2rs=bp2.map(n=>DATA.find(x=>x.name===n)).filter(Boolean);
  let p1groups=p1rs.map(r=>gOf(r));
  let p2groups=p2rs.map(r=>gOf(r));

  // Find matching groups
  let conflicts=[];
  for(let i=0;i<5;i++) {
    for(let j=0;j<5;j++) {
      if(p1groups[i]===p2groups[j] && !conflicts.find(c=>c.p1i===i||c.p2i===j)) {
        conflicts.push({p1i:i, p2i:j, group:p1groups[i]});
      }
    }
  }

  let resultHTML='<div style="text-align:center;margin-top:10px"><div style="font-size:18px;font-weight:700;color:var(--heart);margin-bottom:10px">⚔️ 对战结果</div>';

  if(conflicts.length===0) {
    resultHTML+=`<div style="font-size:14px;color:#666">🎉 没有菜系冲突！双方选的店都可以去！</div>`;
    resultHTML+=`<div style="margin-top:8px;font-size:13px">👨 你: ${p1rs.map(r=>r.name).join('、')}</div>`;
    resultHTML+=`<div style="font-size:13px">👩 老婆: ${p2rs.map(r=>r.name).join('、')}</div>`;
  } else {
    resultHTML+=`<div style="font-size:13px;color:#666;margin-bottom:8px">发现 ${conflicts.length} 组菜系冲突，用剪刀石头布解决！</div>`;
    conflicts.forEach(c=>{
      resultHTML+=`<div style="background:var(--light);border-radius:10px;padding:8px;margin-bottom:6px;font-size:12px">
        <div><b>${c.group}</b> 冲突:</div>
        <div>👨 ${p1rs[c.p1i].name} VS 👩 ${p2rs[c.p2i].name}</div>
        <div class="rps-btns" style="margin:6px 0">
          <div class="rps-btn" onclick="bRPS('${c.p1i}','${c.p2i}','✊')">✊</div>
          <div class="rps-btn" onclick="bRPS('${c.p1i}','${c.p2i}','✋')">✋</div>
          <div class="rps-btn" onclick="bRPS('${c.p1i}','${c.p2i}','✌️')">✌️</div>
        </div>
        <div id="rps-result-${c.p1i}-${c.p2i}" style="font-weight:600;color:var(--heart)"></div>
      </div>`;
    });
  }
  resultHTML+='</div>';
  document.getElementById('bresult').innerHTML=resultHTML;
}

function bRPS(p1i, p2i, p1Choice) {
  let choices=['✊','✋','✌️'];
  let p2Choice=choices[Math.floor(Math.random()*3)];
  let result='';
  if(p1Choice===p2Choice) result='平局！再来一次';
  else if((p1Choice==='✊'&&p2Choice==='✌️')||(p1Choice==='✋'&&p2Choice==='✊')||(p1Choice==='✌️'&&p2Choice==='✋'))
    result='👨 你赢了！去 '+(DATA.find(x=>x.name===bp1[p1i])||{}).name||bp1[p1i];
  else result='👩 老婆赢了！去 '+(DATA.find(x=>x.name===bp2[p2i])||{}).name||bp2[p2i];
  document.getElementById('rps-result-'+p1i+'-'+p2i).innerHTML=`<div>你出${p1Choice} 老婆出${p2Choice}</div><div>${result}</div>`;
}

// ===================== INIT =====================
function bDrops() {
  let rc=document.getElementById('rc'), ra=document.getElementById('ra');
  let gs=[...new Set(DATA.map(r=>gOf(r)))];
  rc.innerHTML='<option value="all">不限菜系</option>'+gs.map(g=>`<option value="${g}">${g}</option>`).join('');
  let as=[...new Set(DATA.map(r=>r.location_area))].sort();
  ra.innerHTML='<option value="all">不限区域</option>'+as.map(a=>`<option value="${a}">${a}</option>`).join('');
}

function init() {
  buildChips(); bDrops(); renderHome(); renderMenu(); renderFavs(); renderHist(); upRcnt();
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
