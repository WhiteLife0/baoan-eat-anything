<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天吃什么 🐷</title>
<style>
:root {
  --pink: #FFD1DC;
  --blush: #F4B8C8;
  --nose: #E8A0B4;
  --light: #FFF5F5;
  --bg: #FFFAFA;
  --dark: #444;
  --grey: #999;
  --white: #fff;
  --shadow: 0 2px 12px rgba(244,184,200,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
}

#app { max-width:480px; margin:0 auto; min-height:100vh; }

/* ========== HEADER ========== */
.header { text-align:center; padding:20px 16px 10px; background:linear-gradient(180deg, var(--light) 0%, var(--bg) 100%); }

.lulu {
  width:80px; height:80px; margin:0 auto 8px;
}

.app-name {
  font-size:22px; font-weight:700; color:#E06080; letter-spacing:2px;
}

.app-sub {
  font-size:12px; color:#bbb; margin-top:2px;
}

/* ========== BOTTOM NAV ========== */
.nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  display:flex; background:white;
  border-top:1px solid #fce8ec;
  padding:6px 0 8px; z-index:999;
  box-shadow:0 -2px 8px rgba(0,0,0,0.04);
}

.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:4px 0; cursor:pointer; color:#ccc; font-size:11px;
  font-weight:600; -webkit-tap-highlight-color:transparent;
  user-select:none; -webkit-user-select:none;
}

.nav-item.active { color:#E06080; }
.nav-icon { font-size:22px; line-height:1; margin-bottom:2px; }

/* ========== PAGES ========== */
.page { display:none; padding:12px 16px 100px; min-height:100vh; }
.page.active { display:block; }

/* ========== HOME PAGE ========== */
.home-section { margin-bottom:20px; }
.home-section-title {
  font-size:15px; font-weight:700; color:var(--dark);
  margin-bottom:10px; display:flex; align-items:center; gap:6px;
}

/* Featured random cards */
.featured-grid { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
.featured-grid::-webkit-scrollbar { display:none; }

.featured-card {
  flex:0 0 auto; width:180px; background:white; border-radius:16px;
  padding:14px; box-shadow: var(--shadow); border:1px solid #fce8ec;
  cursor:pointer; transition:transform 0.15s;
}
.featured-card:active { transform:scale(0.97); }

.featured-card-name {
  font-size:14px; font-weight:600; color:var(--dark); margin-bottom:4px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.featured-card-info {
  font-size:11px; color:var(--grey); line-height:1.4;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden;
}
.featured-card-badge {
  display:inline-block; background:var(--light); color:#E06080;
  font-size:10px; padding:2px 8px; border-radius:8px; margin-top:6px;
}

/* Favorites quick list */
.quick-list {}
.quick-item {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  background:white; border-radius:12px; margin-bottom:6px;
  box-shadow: var(--shadow); cursor:pointer;
}
.quick-item:active { background:#fff5f7; }
.quick-item-emoji { font-size:24px; flex-shrink:0; }
.quick-item-name { flex:1; font-size:14px; font-weight:500; }
.quick-item-meta { font-size:11px; color:var(--grey); }

/* ========== FILTER BAR (Top of menu page) ========== */
.filter-bar { margin-bottom:12px; }
.filter-scroll {
  display:flex; gap:8px; overflow-x:auto; padding:4px 0 8px;
  scrollbar-width:none; -ms-overflow-style:none;
}
.filter-scroll::-webkit-scrollbar { display:none; }

.chip {
  flex-shrink:0; padding:7px 15px; border-radius:20px;
  border:1.5px solid #f0d0d0; background:white; color:#666;
  font-size:13px; cursor:pointer; white-space:nowrap;
  transition:all 0.2s; user-select:none; -webkit-user-select:none;
}
.chip.active {
  background:var(--pink); border-color:var(--pink);
  color:white; font-weight:600; box-shadow:0 3px 10px rgba(244,184,200,0.35);
}

/* ========== SEARCH ========== */
.search-wrap {
  display:flex; align-items:center; background:var(--light);
  border-radius:25px; padding:10px 16px; margin-bottom:12px;
  border:1.5px solid #fce8ec;
}
.search-wrap input {
  flex:1; border:none; background:none; outline:none;
  font-size:14px; color:var(--dark);
}
.search-wrap input::placeholder { color:#ccc; }
.search-icon { margin-right:8px; font-size:16px; }

/* ========== RESTO CARDS ========== */
.card-list { display:flex; flex-direction:column; gap:10px; }

.card {
  background:white; border-radius:18px; padding:14px 16px;
  box-shadow: var(--shadow); border:1px solid #fce8ec;
}
.card.hated { opacity:0.45; }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.card-name { font-size:15px; font-weight:600; flex:1; line-height:1.3; }
.card-rating { font-size:12px; color:#E07050; flex-shrink:0; margin-left:8px; }
.card-tags { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:6px; }
.card-tag {
  font-size:10px; padding:2px 7px; border-radius:8px;
  background:var(--light); color:#999; border:1px solid #fce8ec;
}
.card-tag.cuisine { background:var(--light); color:#E06080; border-color:var(--pink); }
.card-rec { font-size:13px; color:#999; margin-bottom:8px; }
.card-actions { display:flex; gap:8px; }
.btn-sm {
  flex:1; padding:7px 0; border-radius:12px; border:1.5px solid #f0d0d0;
  background:white; font-size:11px; color:#999; cursor:pointer;
  text-align:center; transition:all 0.2s;
  user-select:none; -webkit-user-select:none;
}
.btn-sm:active { background:#f5f5f5; }
.btn-sm.faved { background:#fff0f3; border-color:var(--pink); color:#E06080; }
.btn-sm.hated { background:#f5f5f5; border-color:#ddd; color:#aaa; }
.btn-sm.go { background:var(--pink); border-color:var(--pink); color:white; font-weight:600; }

/* ========== RANDOM PAGE ========== */
.rcontrols {
  background:white; border-radius:18px; padding:14px 16px;
  box-shadow:var(--shadow); border:1px solid #fce8ec; margin-bottom:16px;
}
.rlabel { font-size:13px; font-weight:600; color:#E06080; margin-bottom:8px; }
.rselects { display:flex; flex-direction:column; gap:6px; }
.rselects select {
  padding:9px 12px; border-radius:12px; border:1.5px solid #f0d0d0;
  background:white; font-size:13px; color:var(--dark); outline:none;
  width:100%; -webkit-appearance:none; appearance:none;
}
.rinfo { text-align:center; font-size:12px; color:#bbb; margin-top:8px; }

.rand-card {
  background:linear-gradient(135deg, var(--light) 0%, white 100%);
  border-radius:20px; padding:50px 20px; text-align:center;
  box-shadow:var(--shadow); border:2px dashed var(--pink);
  cursor:pointer; transition:transform 0.15s;
}
.rand-card:active { transform:scale(0.97); }
.rand-q { font-size:20px; font-weight:700; color:#E06080; margin-bottom:24px; }
.rand-btn {
  display:inline-block; background:linear-gradient(135deg, var(--pink) 0%, var(--blush) 100%);
  color:white; font-size:18px; font-weight:700; padding:14px 40px;
  border-radius:30px; border:none; cursor:pointer;
  box-shadow:0 4px 15px rgba(244,184,200,0.45); transition:transform 0.15s;
}
.rand-btn:active { transform:scale(0.95); }
.rand-hint { font-size:12px; color:#ccc; margin-top:14px; }

.result-box {
  background:white; border-radius:20px; padding:24px 20px; text-align:center;
  box-shadow:var(--shadow); border:1px solid #fce8ec;
  animation:pop 0.3s ease-out;
}
@keyframes pop { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }
.result-rname { font-size:22px; font-weight:700; margin-bottom:8px; }
.result-rtags { display:flex; justify-content:center; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
.result-rdetail { font-size:14px; color:#999; margin-bottom:16px; }
.result-btns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
.rbtn {
  padding:8px 18px; border-radius:20px; font-size:13px; cursor:pointer;
  border:1.5px solid #f0d0d0; background:white; color:#999; transition:all 0.15s;
  user-select:none; -webkit-user-select:none;
}
.rbtn:active { background:#f5f5f5; }
.rbtn.fav:active { background:#fff0f3; }
.rbtn.again { background:var(--pink); border-color:var(--pink); color:white; }

.recent-box { margin-top:16px; }
.recent-title { font-size:13px; font-weight:600; color:#bbb; margin-bottom:8px; }
.recent-item {
  background:white; border-radius:10px; padding:8px 12px; margin-bottom:4px;
  font-size:14px; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,0.04);
}
.recent-item:active { background:#fff5f7; }

/* ========== FAV & HISTORY ========== */
.section-header {
  font-size:16px; font-weight:600; margin-bottom:12px;
  display:flex; align-items:center; gap:6px;
}
.badge {
  background:var(--pink); color:white; font-size:11px;
  padding:1px 8px; border-radius:10px; font-weight:700;
}

.empty-box { text-align:center; padding:60px 20px; }
.empty-emoji { font-size:56px; margin-bottom:12px; }
.empty-text { font-size:14px; color:#ccc; line-height:1.6; }

.history-stats { display:flex; gap:10px; margin-bottom:10px; }
.stat {
  flex:1; background:white; border-radius:14px; padding:12px; text-align:center;
  box-shadow:var(--shadow); font-size:13px; color:#999;
}
.stat-num { font-size:24px; font-weight:700; color:#E06080; display:block; }

.hist-item {
  background:white; border-radius:14px; padding:10px 14px; margin-bottom:6px;
  display:flex; justify-content:space-between; align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
}
.hist-info { flex:1; min-width:0; }
.hist-name { font-size:14px; font-weight:600; color:var(--dark); }
.hist-meta { font-size:11px; color:#bbb; }
.hist-time { font-size:10px; color:#ddd; }
.hist-again-btn {
  font-size:11px; padding:4px 12px; border-radius:10px;
  border:1px solid var(--pink); background:white; color:#E06080; cursor:pointer;
}

/* ========== TOAST ========== */
.toast {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
  background:var(--dark); color:white; padding:8px 20px; border-radius:20px;
  font-size:13px; z-index:9999; animation:fadeInOut 1.8s ease forwards;
  pointer-events:none;
}
@keyframes fadeInOut {
  0%{opacity:0;transform:translateX(-50%) translateY(10px)}
  15%{opacity:1;transform:translateX(-50%) translateY(0)}
  75%{opacity:1;transform:translateX(-50%) translateY(0)}
  100%{opacity:0;transform:translateX(-50%) translateY(-10px)}
}
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div class="lulu">
      <svg viewBox="0 0 100 100" style="width:80px;height:80px">
        <!-- 身体 -->
        <ellipse cx="50" cy="82" rx="42" ry="18" fill="#FFF5F5" stroke="#F4B8C8" stroke-width="1.5"/>
        <!-- 耳朵 -->
        <ellipse cx="28" cy="20" rx="12" ry="10" fill="#FFD1DC"/>
        <ellipse cx="72" cy="20" rx="12" ry="10" fill="#FFD1DC"/>
        <!-- 耳朵内 -->
        <ellipse cx="28" cy="22" rx="7" ry="6" fill="#F4B8C8"/>
        <ellipse cx="72" cy="22" rx="7" ry="6" fill="#F4B8C8"/>
        <!-- 脸 -->
        <circle cx="50" cy="52" r="28" fill="#FFD1DC"/>
        <!-- 眼睛-小黑点 -->
        <circle cx="40" cy="48" r="3" fill="#333"/>
        <circle cx="60" cy="48" r="3" fill="#333"/>
        <!-- 鼻子-椭圆 -->
        <ellipse cx="50" cy="56" rx="7" ry="5" fill="#E8A0B4"/>
        <!-- 鼻子高光 -->
        <ellipse cx="48" cy="54" rx="2.5" ry="1.5" fill="white" opacity="0.5"/>
        <!-- 嘴巴-小弧线 -->
        <path d="M46 62 Q50 66 54 62" stroke="#E8A0B4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- 腮红 -->
        <circle cx="34" cy="56" r="6" fill="#F4B8C8" opacity="0.5"/>
        <circle cx="66" cy="56" r="6" fill="#F4B8C8" opacity="0.5"/>
        <!-- 小手 -->
        <ellipse cx="14" cy="68" rx="6" ry="5" fill="#FFD1DC" transform="rotate(-20,14,68)"/>
        <ellipse cx="86" cy="68" rx="6" ry="5" fill="#FFD1DC" transform="rotate(20,86,68)"/>
      </svg>
    </div>
    <div class="app-name">今天吃什么</div>
    <div class="app-sub">深圳 · 宝安区美食指南</div>
  </div>

  <!-- ========================== -->
  <!-- PAGE 1: HOME -->
  <!-- ========================== -->
  <div id="pg-home" class="page active">
    <div class="home-section" id="home-featured">
      <div class="home-section-title">🎲 随机推荐</div>
      <div class="featured-grid" id="featured-grid"></div>
    </div>
    <div class="home-section" id="home-favs">
      <div class="home-section-title">❤️ 我的珍藏</div>
      <div id="home-fav-list" class="quick-list"></div>
    </div>
    <div class="home-section" id="home-recent">
      <div class="home-section-title">📋 最近吃过</div>
      <div id="home-recent-list" class="quick-list"></div>
    </div>
  </div>

  <!-- ========================== -->
  <!-- PAGE 2: MENU -->
  <!-- ========================== -->
  <div id="pg-menu" class="page">
    <div class="filter-bar">
      <div class="filter-scroll" id="filter-scroll"></div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="搜索餐厅..." oninput="searchMenu()">
    </div>
    <div class="card-list" id="card-list"></div>
  </div>

  <!-- ========================== -->
  <!-- PAGE 3: RANDOM -->
  <!-- ========================== -->
  <div id="pg-random" class="page">
    <div class="rcontrols">
      <div class="rlabel">🎯 限定范围</div>
      <div class="rselects">
        <select id="rcuisine" onchange="updateRandomCount()"><option value="all">不限菜系</option></select>
        <select id="rarea" onchange="updateRandomCount()"><option value="all">不限区域</option></select>
      </div>
      <div class="rinfo" id="rinfo">可在 233 家中随机</div>
    </div>

    <div class="rand-card" id="rand-card" onclick="doRandom()">
      <div class="rand-q">今天想吃什么呢？</div>
      <div class="rand-btn" onclick="event.stopPropagation();doRandom()">🎲 随机摇一个！</div>
      <div class="rand-hint">戳 lulu 也可以哦~</div>
    </div>

    <div class="result-box" id="result-box" style="display:none">
      <div class="result-rname" id="rname"></div>
      <div class="result-rtags" id="rtags"></div>
      <div class="result-rdetail" id="rdetail"></div>
      <div class="result-btns">
        <button class="rbtn fav" onclick="favCurrent()">❤️ 收藏</button>
        <button class="rbtn" onclick="hateCurrent()">💔 踩雷</button>
        <button class="rbtn again" onclick="doRandom()">🎲 再来</button>
      </div>
    </div>

    <div class="recent-box" id="recent-box">
      <div class="recent-title">🕐 刚刚摇过的</div>
      <div id="recent-list"></div>
    </div>
  </div>

  <!-- ========================== -->
  <!-- PAGE 4: FAVORITES -->
  <!-- ========================== -->
  <div id="pg-favs" class="page">
    <div class="section-header">❤️ 我的收藏 <span class="badge" id="fav-badge">0</span></div>
    <div id="fav-empty" class="empty-box"><div class="empty-emoji">😴</div><div class="empty-text">还没有收藏哦~<br>去逛逛菜单吧！</div></div>
    <div class="card-list" id="fav-cards"></div>
  </div>

  <!-- ========================== -->
  <!-- PAGE 5: HISTORY -->
  <!-- ========================== -->
  <div id="pg-hist" class="page">
    <div class="section-header">📋 点餐记录 <span class="badge" id="hist-badge">0</span></div>
    <div id="hist-stats"></div>
    <div id="hist-empty" class="empty-box"><div class="empty-emoji">🍽️</div><div class="empty-text">还没有记录哦~</div></div>
    <div id="hist-list"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="nav" id="nav">
  <div class="nav-item active" data-pg="home" onclick="goPage('home')">
    <div class="nav-icon">🏠</div>首页
  </div>
  <div class="nav-item" data-pg="menu" onclick="goPage('menu')">
    <div class="nav-icon">🍽️</div>菜单
  </div>
  <div class="nav-item" data-pg="random" onclick="goPage('random')">
    <div class="nav-icon">🎲</div>随机
  </div>
  <div class="nav-item" data-pg="favs" onclick="goPage('favs')">
    <div class="nav-icon">❤️</div>收藏
  </div>
</div>

function groupOf(r) { for(let g of GROUPS) if(g.f(r.category)) return g.n; return '🍢 其他'; }

// ================ STORAGE ================
function getFavs()  { try { return JSON.parse(localStorage.getItem('_favs')||'[]'); } catch(e){return[];} }
function setFavs(f) { localStorage.setItem('_favs', JSON.stringify(f)); }
function getHates() { try { return JSON.parse(localStorage.getItem('_hates')||'[]'); } catch(e){return[];} }
function setHates(h){ localStorage.setItem('_hates', JSON.stringify(h)); }
function getHist()  { try { return JSON.parse(localStorage.getItem('_hist')||'[]'); } catch(e){return[];} }
function setHist(h) { localStorage.setItem('_hist', JSON.stringify(h)); }

function isFav(name)  { return getFavs().includes(name); }
function isHate(name) { return getHates().includes(name); }

function toggleFav(name) {
  let f = getFavs(); let was = f.includes(name);
  if(was) f=f.filter(x=>x!==name); else f.unshift(name);
  setFavs(f); return !was;
}

function toggleHate(name) {
  let h = getHates(); let was = h.includes(name);
  if(was) h=h.filter(x=>x!==name); else h.unshift(name);
  setHates(h); return !was;
}

function addHist(r) {
  let h = getHist();
  h = h.filter(x=>x.name!==r.name);
  h.unshift({name:r.name, cat:r.category, area:r.location_area, rec:r.recommend, rating:r.rating, price:r.price_range, time:new Date().toLocaleString('zh-CN')});
  if(h.length>100) h=h.slice(0,100);
  setHist(h);
}

function toast(msg) {
  let t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2000);
}

// ================ NAVIGATION ================
let curPage = 'home';

function goPage(pg) {
  curPage = pg;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+pg).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector('.nav-item[data-pg="'+pg+'"]').classList.add('active');

  window.scrollTo(0,0);
  if(pg==='home') renderHome();
  else if(pg==='menu') renderMenu();
  else if(pg==='random') updateRandomCount();
  else if(pg==='favs') renderFavs();
  else if(pg==='hist') renderHist();
}

// ================ HOME PAGE ================
function renderHome() {
  // Featured: 6 random non-hated
  let hates = getHates();
  let pool = DATA.filter(r=>!hates.includes(r.name));
  let shuffled = [...pool].sort(()=>Math.random()-0.5).slice(0,6);
  let fg = document.getElementById('featured-grid');
  fg.innerHTML = shuffled.map(r=>`
    <div class="featured-card" onclick="goPage('menu');">
      <div class="featured-card-name">${r.name}</div>
      <div class="featured-card-info">💡 ${r.recommend}</div>
      <span class="featured-card-badge">${groupOf(r)} · ⭐${r.rating}</span>
    </div>
  `).join('');

  // Favorite quick list
  let favs = getFavs().slice(0,5);
  let hfl = document.getElementById('home-fav-list');
  let hfs = document.getElementById('home-favs');
  if(favs.length===0) { hfs.style.display='none'; }
  else {
    hfs.style.display='block';
    hfl.innerHTML = favs.map(name=>{
      let r = DATA.find(x=>x.name===name);
      if(!r) return '';
      return `<div class="quick-item" onclick="goPage('favs')">
        <span class="quick-item-emoji">❤️</span>
        <span class="quick-item-name">${r.name}</span>
        <span class="quick-item-meta">${groupOf(r)} · ⭐${r.rating}</span>
      </div>`;
    }).join('');
  }

  // Recent history
  let hist = getHist().slice(0,5);
  let hrl = document.getElementById('home-recent-list');
  let hrs = document.getElementById('home-recent');
  if(hist.length===0) { hrs.style.display='none'; }
  else {
    hrs.style.display='block';
    hrl.innerHTML = hist.map(h=>`
      <div class="quick-item" onclick="goPage('hist')">
        <span class="quick-item-emoji">🍽️</span>
        <span class="quick-item-name">${h.name}</span>
        <span class="quick-item-meta">${h.time}</span>
      </div>
    `).join('');
  }
}

// ================ MENU PAGE ================
let menuCuisine = 'all';
let menuSearch = '';

function buildFilterChips() {
  let unique = [...new Set(DATA.map(r=>groupOf(r)))];
  let sc = document.getElementById('filter-scroll');
  sc.innerHTML = '<span class="chip active" onclick="setMenuCuisine(\'all\')">🍽️ 全部</span>' +
    unique.map(g=>`<span class="chip" onclick="setMenuCuisine('${g}')">${g}</span>`).join('');
}

function setMenuCuisine(c) {
  menuCuisine = c;
  document.querySelectorAll('#filter-scroll .chip').forEach(ch=>{
    // Extract just the cuisine part (after emoji) from onclick attribute
    ch.classList.toggle('active', ch.textContent.trim().startsWith(c.replace(/^[^\s]+\s/,'')));
  });
  // Better approach: use data attribute
  // For now just re-render
  renderMenu();
}

function searchMenu() {
  menuSearch = document.getElementById('search-input').value;
  renderMenu();
}

function renderMenu() {
  let list = DATA;
  if(menuCuisine!=='all') list = list.filter(r=>groupOf(r)===menuCuisine);
  if(menuSearch) list = list.filter(r=>r.name.includes(menuSearch));

  let cl = document.getElementById('card-list');
  if(list.length===0) {
    cl.innerHTML = '<div class="empty-box"><div class="empty-emoji">😅</div><div class="empty-text">没找到匹配的餐厅</div></div>';
    return;
  }

  cl.innerHTML = list.map(r=>{
    let fav = isFav(r.name), hate = isHate(r.name);
    return `<div class="card ${hate?'hated':''}">
      <div class="card-top">
        <span class="card-name">${r.name}</span>
        <span class="card-rating">⭐${r.rating}</span>
      </div>
      <div class="card-tags">
        <span class="card-tag cuisine">${groupOf(r)}</span>
        <span class="card-tag">${r.price_range}元</span>
        <span class="card-tag">${r.location_area}</span>
      </div>
      <div class="card-rec">💡 ${r.recommend}</div>
      <div class="card-actions">
        <button class="btn-sm ${fav?'faved':''}" onclick="menuFav('${r.name.replace(/'/g,"\\'")}')">${fav?'❤️':'🤍'} ${fav?'已收藏':'收藏'}</button>
        <button class="btn-sm ${hate?'hated-go':''}" onclick="menuHate('${r.name.replace(/'/g,"\\'")}')">${hate?'💔':'🤍'} ${hate?'已踩雷':'踩雷'}</button>
        <button class="btn-sm go" onclick="menuEat('${r.name.replace(/'/g,"\\'")}')">🍽️ 就吃这个</button>
      </div>
    </div>`;
  }).join('');
}

function menuFav(name) {
  let added = toggleFav(name);
  toast(added?'❤️ 已收藏':'已取消收藏');
  renderMenu(); renderHome();
}

function menuHate(name) {
  let added = toggleHate(name);
  toast(added?'💔 已踩雷，随机时会排除':'已取消踩雷');
  renderMenu(); renderHome();
}

function menuEat(name) {
  let r = DATA.find(x=>x.name===name);
  if(r) { addHist(r); toast('🍽️ 已记录！'); }
  renderHome();
}

// ================ RANDOM PAGE ================
let randResult = null;
let recentRands = [];

function updateRandomCount() {
  let pool = getRandPool();
  document.getElementById('rinfo').textContent = `可在 ${pool.length} 家中随机`;
}

function getRandPool() {
  let pool = [...DATA].filter(r=>!isHate(r.name));
  let c = document.getElementById('rcuisine').value;
  let a = document.getElementById('rarea').value;
  if(c!=='all') pool = pool.filter(r=>groupOf(r)===c);
  if(a!=='all') pool = pool.filter(r=>r.location_area===a);
  return pool;
}

function doRandom() {
  let pool = getRandPool();
  if(pool.length===0) { toast('😅 都踩雷了！换个条件~'); return; }
  let r = pool[Math.floor(Math.random()*pool.length)];
  randResult = r;
  addHist(r);

  document.getElementById('rand-card').style.display='none';
  let rb = document.getElementById('result-box');
  rb.style.display='block';
  document.getElementById('rname').textContent = r.name;
  document.getElementById('rtags').innerHTML =
    `<span class="card-tag cuisine">${groupOf(r)}</span>
     <span class="card-tag">${r.price_range}元</span>
     <span class="card-tag">${r.location_area}</span>
     <span class="card-tag">⭐${r.rating}</span>`;
  document.getElementById('rdetail').textContent = '💡 ' + r.recommend;

  // Update recent
  recentRands = recentRands.filter(x=>x.name!==r.name);
  recentRands.unshift(r);
  if(recentRands.length>8) recentRands=recentRands.slice(0,8);
  renderRecent();
  renderHome();
}

function favCurrent() {
  if(!randResult) return;
  toggleFav(randResult.name);
  toast('❤️ 已收藏');
  renderHome();
}

function hateCurrent() {
  if(!randResult) return;
  toggleHate(randResult.name);
  document.getElementById('rand-card').style.display='block';
  document.getElementById('result-box').style.display='none';
  toast('💔 已踩雷');
  renderHome();
}

function renderRecent() {
  let rl = document.getElementById('recent-list');
  rl.innerHTML = recentRands.map(r=>`
    <div class="recent-item" onclick="reRand('${r.name.replace(/'/g,"\\'")}')">
      ${r.name} · ${groupOf(r)} · ⭐${r.rating}
    </div>
  `).join('');
}

function reRand(name) {
  let r = DATA.find(x=>x.name===name);
  if(!r) return;
  randResult = r;
  document.getElementById('rand-card').style.display='none';
  let rb = document.getElementById('result-box');
  rb.style.display='block';
  document.getElementById('rname').textContent = r.name;
  document.getElementById('rtags').innerHTML =
    `<span class="card-tag cuisine">${groupOf(r)}</span>
     <span class="card-tag">${r.price_range}元</span>
     <span class="card-tag">${r.location_area}</span>
     <span class="card-tag">⭐${r.rating}</span>`;
  document.getElementById('rdetail').textContent = '💡 ' + r.recommend;
}

// ================ FAVS PAGE ================
function renderFavs() {
  let favs = getFavs();
  document.getElementById('fav-badge').textContent = favs.length;
  let empty = document.getElementById('fav-empty');
  let cards = document.getElementById('fav-cards');

  if(favs.length===0) { empty.style.display='block'; cards.innerHTML=''; return; }
  empty.style.display='none';

  cards.innerHTML = favs.map(name=>{
    let r = DATA.find(x=>x.name===name);
    if(!r) return '';
    return `<div class="card">
      <div class="card-top">
        <span class="card-name">${r.name}</span>
        <span class="card-rating">⭐${r.rating}</span>
      </div>
      <div class="card-tags">
        <span class="card-tag cuisine">${groupOf(r)}</span>
        <span class="card-tag">${r.price_range}元</span>
        <span class="card-tag">${r.location_area}</span>
      </div>
      <div class="card-rec">💡 ${r.recommend}</div>
      <div class="card-actions">
        <button class="btn-sm faved" onclick="toggleFav('${r.name.replace(/'/g,"\\'")}');renderFavs();renderHome();">❤️ 取消收藏</button>
        <button class="btn-sm go" onclick="menuEat('${r.name.replace(/'/g,"\\'")}')">🍽️ 就吃这个</button>
      </div>
    </div>`;
  }).join('');
}

// ================ HISTORY PAGE ================
function renderHist() {
  let h = getHist();
  document.getElementById('hist-badge').textContent = h.length;
  let empty = document.getElementById('hist-empty');
  let list = document.getElementById('hist-list');
  let stats = document.getElementById('hist-stats');

  if(h.length===0) { empty.style.display='block'; list.innerHTML=''; stats.innerHTML=''; return; }
  empty.style.display='none';

  let unique = new Set(h.map(x=>x.name)).size;
  stats.innerHTML = `<div class="history-stats">
    <div class="stat"><span class="stat-num">${h.length}</span>次点餐</div>
    <div class="stat"><span class="stat-num">${unique}</span>家餐厅</div>
  </div>`;

  list.innerHTML = h.map(item=>`
    <div class="hist-item">
      <div class="hist-info">
        <div class="hist-name">${item.name}</div>
        <div class="hist-meta">${item.area}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:8px">
        <div class="hist-time">${item.time}</div>
        <button class="hist-again-btn" onclick="menuEat('${item.name.replace(/'/g,"\\'")}');renderHist();">再吃一次</button>
      </div>
    </div>
  `).join('');
}

// ================ BUILD RANDOM DROPDOWNS ================
function buildRandomDrops() {
  let c = document.getElementById('rcuisine');
  let groups = [...new Set(DATA.map(r=>groupOf(r)))];
  c.innerHTML = '<option value="all">不限菜系</option>' + groups.map(g=>`<option value="${g}">${g}</option>`).join('');

  let a = document.getElementById('rarea');
  let areas = [...new Set(DATA.map(r=>r.location_area))].sort();
  a.innerHTML = '<option value="all">不限区域</option>' + areas.map(x=>`<option value="${x}">${x}</option>`).join('');
}

// ================ INIT ================
function init() {
  buildFilterChips();
  buildRandomDrops();
  renderHome();
  renderFavs();
  renderHist();
  updateRandomCount();
}
init();
</script>
</body>
</html>
