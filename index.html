<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天吃什么 🐷</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root{--pink:#FFD1DC;--blush:#F4B8C8;--nose:#E8A0B4;--light:#FFF5F5;--bg:#FFFAFA;--dark:#444;--grey:#999;--w:#fff;--sh:0 2px 12px rgba(244,184,200,.18);--heart:#E06080}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--dark);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh}

/* Header */
.hd{text-align:center;padding:16px 16px 4px;background:linear-gradient(180deg,var(--light)0%,var(--bg)100%);position:relative;overflow:hidden}
.hd::after{content:'';position:absolute;top:20px;right:15px;width:24px;height:24px;background:radial-gradient(circle,#F4B8C8,transparent 70%);border-radius:50%;opacity:.4;animation:fl 4s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.lulu-svg{width:60px;height:60px;margin:0 auto 4px}
.app-name{font-size:20px;font-weight:700;color:var(--heart);letter-spacing:2px}
.app-sub{font-size:11px;color:#bbb}

/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--w);border-top:1px solid #fce8ec;padding:4px 0 8px;z-index:999;box-shadow:0 -2px 8px rgba(0,0,0,.04)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0;cursor:pointer;color:#ccc;font-size:10px;font-weight:600;user-select:none;transition:color .15s}
.nav-item.active{color:#E06080}
.nav-icon{font-size:20px;line-height:1;margin-bottom:2px}
.nav-badge{position:absolute;top:-4px;right:-12px;background:#ff6b8a;color:white;font-size:9px;width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;font-weight:700}

/* Pages */
.page{display:none;padding:10px 14px 100px;animation:fi .25s}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Common */
.sec{margin-bottom:16px}
.sec-title{font-size:14px;font-weight:700;margin-bottom:8px;color:var(--dark)}
.feat-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.feat-scroll::-webkit-scrollbar{display:none}
.feat-card{flex:0 0 auto;width:145px;background:var(--w);border-radius:14px;padding:10px;box-shadow:var(--sh);border:1px solid #fce8ec;cursor:pointer;transition:transform .15s}
.feat-card:active{transform:scale(.97)}
.fc-name{font-size:13px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fc-tag{display:inline-block;background:var(--light);color:var(--heart);font-size:10px;padding:2px 6px;border-radius:5px}
.fc-rating{font-size:11px;color:#E07050;margin-top:3px}
.quick-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--w);border-radius:12px;margin-bottom:5px;box-shadow:var(--sh);cursor:pointer}
.quick-item:active{background:#fff5f7}
.qi-emoji{font-size:20px;flex-shrink:0}
.qi-text{flex:1;min-width:0}
.qi-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qi-meta{font-size:10px;color:var(--grey)}

/* Menu */
.fscroll{display:flex;gap:5px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none;margin-bottom:8px}
.fscroll::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:16px;border:1.5px solid #f0d0d0;background:var(--w);color:#666;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .2s;user-select:none}
.chip.active{background:var(--pink);border-color:var(--pink);color:white;font-weight:600;box-shadow:0 3px 10px rgba(244,184,200,.35)}
.swrap{display:flex;align-items:center;background:var(--light);border-radius:20px;padding:8px 12px;margin-bottom:8px;border:1.5px solid #fce8ec}
.swrap input{flex:1;border:none;background:none;outline:none;font-size:13px;color:var(--dark)}
.si{margin-right:6px}
.card-list{display:flex;flex-direction:column;gap:8px}
.card{background:var(--w);border-radius:16px;padding:10px 12px;box-shadow:var(--sh);border:1px solid #fce8ec;cursor:pointer;transition:transform .15s}
.card:active{transform:scale(.98)}
.card.hated{opacity:.4}
.card-top{display:flex;justify-content:space-between;margin-bottom:4px}
.card-name{font-size:13px;font-weight:600;flex:1}
.card-rating{font-size:11px;color:#E07050;flex-shrink:0}
.card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px}
.card-tag{font-size:9px;padding:1px 6px;border-radius:6px;background:var(--light);color:#999}
.card-tag.cui{background:var(--light);color:var(--heart);border-color:var(--pink)}
.card-rec{font-size:11px;color:#999;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-acts{display:flex;gap:6px}
.btn{flex:1;padding:6px 0;border-radius:10px;border:1.5px solid #f0d0d0;background:var(--w);font-size:10px;color:#999;cursor:pointer;text-align:center;user-select:none;transition:all .15s}
.btn:active{background:#f5f5f5}
.btn.faved{background:#fff0f3;border-color:var(--pink);color:var(--heart)}
.btn.go{background:var(--pink);border-color:var(--pink);color:white;font-weight:600}

/* Modal */
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:1000;justify-content:center;align-items:flex-end}
.modal-bg.show{display:flex}
.modal{background:var(--w);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:18px 14px 36px;animation:su .3s;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-close{font-size:22px;color:#ccc;cursor:pointer;float:right;margin:-2px 0 0 4px}
.modal-name{font-size:18px;font-weight:700;margin-bottom:4px}
.modal-info{font-size:11px;color:var(--grey);margin-bottom:10px;line-height:1.5}
.modal-addr{background:var(--light);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#666}
.addr-label{font-weight:600;color:var(--heart);margin-bottom:2px}
.modal-dish{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #fef0f0}
.dish-emoji{font-size:28px;width:36px;text-align:center;flex-shrink:0}
.dish-info{flex:1}
.dish-name{font-size:13px;font-weight:600;margin-bottom:2px}
.dish-desc{font-size:11px;color:var(--grey);margin-bottom:3px}
.dish-meta{font-size:10px;color:#bbb;display:flex;gap:8px}
.stars{color:#ffb300}

/* Random */
.rctrls{background:var(--w);border-radius:16px;padding:10px 14px;box-shadow:var(--sh);margin-bottom:12px}
.rsel{display:flex;flex-direction:column;gap:4px;margin-top:5px}
.rsel select{padding:7px 10px;border-radius:10px;border:1.5px solid #f0d0d0;background:var(--w);font-size:12px;outline:none;width:100%;-webkit-appearance:none}
.rand-card{background:linear-gradient(135deg,var(--light)0%,white 100%);border-radius:18px;padding:36px 16px;text-align:center;box-shadow:var(--sh);border:2px dashed var(--pink);cursor:pointer}
.rand-q{font-size:17px;font-weight:700;color:var(--heart);margin-bottom:16px}
.rand-btn{display:inline-block;background:linear-gradient(135deg,var(--pink)0%,var(--blush)100%);color:white;font-size:15px;font-weight:700;padding:11px 30px;border-radius:24px;cursor:pointer;box-shadow:0 4px 14px rgba(244,184,200,.4)}
.rand-btn:active{transform:scale(.95)}
.result-box{background:var(--w);border-radius:18px;padding:20px 16px;text-align:center;box-shadow:var(--sh);animation:pop .3s}
@keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
.rbtns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:12px}
.rbtn{padding:6px 14px;border-radius:16px;font-size:11px;cursor:pointer;border:1.5px solid #f0d0d0;background:var(--w);color:#999;user-select:none}
.rbtn.again{background:var(--pink);border-color:var(--pink);color:white}
.recent{margin-top:12px}
.rec-title{font-size:12px;font-weight:600;color:#bbb;margin-bottom:6px}
.rec-item{background:var(--w);border-radius:8px;padding:6px 10px;margin-bottom:3px;font-size:12px;cursor:pointer}

/* Favorites & History */
.sec-header{font-size:15px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.badge{background:var(--pink);color:white;font-size:9px;padding:1px 7px;border-radius:8px;font-weight:700}
.empty{text-align:center;padding:50px 16px}
.empty-emoji{font-size:48px;margin-bottom:8px}
.empty-text{font-size:13px;color:#ccc}
.stats-box{display:flex;gap:8px;margin-bottom:8px}
.stat{flex:1;background:var(--w);border-radius:12px;padding:10px;text-align:center;box-shadow:var(--sh)}
.stat-num{font-size:20px;font-weight:700;color:var(--heart);display:block}
.stat-label{font-size:10px;color:var(--grey)}
.h-item{background:var(--w);border-radius:12px;padding:8px 12px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.h-info{flex:1;min-width:0}
.h-name{font-size:13px;font-weight:600;cursor:pointer}
.h-meta{font-size:10px;color:#bbb;margin-top:1px}
.h-rate{color:#ffb300;font-size:10px}
.h-del{color:#ccc;font-size:15px;cursor:pointer;padding:4px}

/* ===== BATTLE ===== */
.battle-setup{background:var(--w);border-radius:16px;padding:14px;box-shadow:var(--sh)}
.battle-subtitle{font-size:12px;color:#666;margin-bottom:12px}
.battle-connect{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.battle-btn{background:linear-gradient(135deg,var(--pink),var(--blush));color:white;border:none;padding:10px 20px;border-radius:18px;font-size:13px;font-weight:600;cursor:pointer;width:100%}
.battle-btn:active{opacity:.8}
.battle-btn.danger{background:#ff6b8a}
.battle-input{width:100%;padding:8px 12px;border-radius:10px;border:1.5px solid #f0d0d0;font-size:13px;outline:none;text-align:center;letter-spacing:2px}
.code-display{text-align:center;background:var(--light);border-radius:12px;padding:14px;font-size:22px;font-weight:700;letter-spacing:4px;color:var(--heart);border:2px dashed var(--pink)}
.picks-section{margin-top:10px}
.timer{text-align:center;font-size:28px;font-weight:700;color:var(--heart);margin:8px 0}
.timer.warning{color:#ff6b4a;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.battle-search{width:100%;padding:7px 10px;border-radius:8px;border:1.5px solid #f0d0d0;font-size:12px;outline:none;margin-bottom:6px}
.battle-picks{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.bp-chip{background:var(--light);border:1.5px solid #f0d0d0;border-radius:8px;padding:4px 8px;font-size:11px;cursor:pointer;user-select:none;transition:all .15s}
.bp-chip.selected{background:var(--pink);border-color:var(--pink);color:white;font-weight:600}
.bp-chip.opponent{background:#e8f5e9;border-color:#81c784;color:#388e3c}
.bsr div{padding:5px 8px;cursor:pointer;font-size:11px;border-bottom:1px solid #fef0f0;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bsr div:active{background:var(--light)}

/* Toast */
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:var(--dark);color:white;padding:8px 20px;border-radius:20px;font-size:12px;z-index:9999;animation:ti 2s forwards;pointer-events:none;white-space:nowrap}
@keyframes ti{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}
.flirt-box{background:linear-gradient(135deg,#fff0f3 0%,#fff9f9 100%);border-radius:14px;padding:12px 14px;margin-bottom:14px;text-align:center;cursor:pointer;border:1.5px dashed var(--pink);box-shadow:var(--sh);transition:transform .2s;user-select:none}
.flirt-box:active{transform:scale(.98)}
.flirt-text{font-size:14px;color:var(--heart);font-weight:500;line-height:1.5;min-height:42px;display:flex;align-items:center;justify-content:center}
.flirt-hint{font-size:10px;color:#ccc;margin-top:4px}
</style>
</head>
<body>

<div id="app">
  <header class="hd">
    <svg viewBox="0 0 60 60" class="lulu-svg"><circle cx="30" cy="32" r="18" fill="#FFD1DC"/><circle cx="24" cy="29" r="2" fill="#333"/><circle cx="36" cy="29" r="2" fill="#333"/><ellipse cx="30" cy="35" rx="5" ry="4" fill="#E8A0B4"/><ellipse cx="16" cy="14" rx="8" ry="6" fill="#FFD1DC"/><ellipse cx="44" cy="14" rx="8" ry="6" fill="#FFD1DC"/><ellipse cx="29" cy="40" rx="1.5" ry="1" fill="white" opacity=".5"/></svg>
    <div class="app-name">今天吃什么</div>
    <div class="app-sub">深圳 · 宝安区 · 350家</div>
  </header>

 <!-- HOME -->
 <div id="pg-home" class="page active">
    <div class="flirt-box" id="flirt-box" onclick="nextFlirt()">
      <div class="flirt-text" id="flirt-text"></div>
      <div class="flirt-hint">戳一下换一句 💬</div>
    </div>
   <div class="sec"><div class="sec-title">🎲 随机推荐</div><div class="feat-scroll" id="feat-g"></div></div>
    <div class="sec" id="s-favs"><div class="sec-title">❤️ 我的珍藏</div><div id="fav-quick"></div></div>
    <div class="sec" id="s-hist"><div class="sec-title">📋 最近吃过</div><div id="hist-quick"></div></div>
    <div class="sec" id="s-rated"><div class="sec-title">⭐ 高分推荐</div><div id="top-rated"></div></div>
  </div>

  <!-- MENU -->
  <div id="pg-menu" class="page">
    <div class="fscroll" id="fscroll"></div>
    <div class="swrap"><span class="si">🔍</span><input type="text" id="srch" placeholder="搜索餐厅..." oninput="srch()"></div>
    <div class="card-list" id="mlist"></div>
  </div>

  <!-- RANDOM -->
  <div id="pg-random" class="page">
    <div class="rctrls">
      <div style="font-size:12px;font-weight:600;color:var(--heart)">🎯 限定范围</div>
      <div class="rsel"><select id="rc" onchange="upRcnt()"><option value="all">不限菜系</option></select><select id="ra" onchange="upRcnt()"><option value="all">不限区域</option></select></div>
      <div style="text-align:center;font-size:11px;color:#bbb;margin-top:6px" id="rinfo"></div>
    </div>
    <div class="rand-card" id="rcard" onclick="doR()">
      <div class="rand-q">今天想吃什么呢？</div>
      <span class="rand-btn" onclick="event.stopPropagation();doR()">🎲 摇一个！</span>
    </div>
    <div class="result-box" id="rbox" style="display:none">
      <div style="font-size:18px;font-weight:700" id="rn"></div>
      <div style="display:flex;justify-content:center;gap:3px;flex-wrap:wrap;margin:6px 0" id="rt"></div>
      <div style="font-size:12px;color:#999" id="rd"></div>
      <div class="rbtns">
        <button class="rbtn" onclick="rFav()" id="rfb">🤍 收藏</button>
        <button class="rbtn" onclick="rHate()">💔 踩雷</button>
        <button class="rbtn again" onclick="doR()">🎲 再来</button>
      </div>
    </div>
    <div class="recent"><div class="rec-title">🕐 刚刚摇过</div><div id="rlist"></div></div>
  </div>

  <!-- BATTLE -->
  <div id="pg-battle" class="page">
    <div class="sec-header">⚔️ 双人对战</div>
    <div class="battle-setup">
      <div class="battle-subtitle">和老婆各自挑选5家餐厅，系统比对菜系后用剪刀石头布决胜负！</div>

      <!-- Connection UI -->
      <div id="battle-connect" class="battle-connect">
        <button class="battle-btn" onclick="createRoom()">🏠 开启房间</button>
        <div style="text-align:center;color:#bbb;font-size:12px">—— 或 ——</div>
        <input class="battle-input" id="join-code" placeholder="输入匹配码" maxlength="20">
        <button class="battle-btn" onclick="joinRoom()" style="background:linear-gradient(135deg,#81c784,#66bb6a)">🔗 加入房间</button>
      </div>

      <!-- Game Lobby -->
      <div id="battle-lobby" style="display:none">
        <div id="code-show" class="code-display"></div>
        <div style="text-align:center;font-size:12px;color:#bbb;margin-top:4px" id="peer-status">等待对方连接...</div>

        <!-- Timer -->
        <div class="timer" id="game-timer" style="display:none"></div>

        <!-- Pick area -->
        <div class="picks-section" id="picks-area" style="display:none">
          <div style="font-size:13px;font-weight:600;color:var(--heart);margin-bottom:6px">🎯 你的选择 (<span id="mypick-count">0</span>/5)</div>
          <div class="battle-picks" id="mypicks"></div>
          <input class="battle-search" id="bsearch" placeholder="搜索餐厅..." oninput="bSearch()">
          <div class="bsr" id="bsr" style="max-height:120px;overflow-y:auto"></div>

          <div style="font-size:13px;font-weight:600;color:#388e3c;margin:10px 0 6px">👩 对方选择</div>
          <div class="battle-picks" id="oppicks"></div>

          <button class="battle-btn" onclick="confirmPicks()" id="confirm-btn" style="margin-top:10px;opacity:.5" disabled>确认选择 (双方都确认后开始)</button>
        </div>

        <!-- Battle result -->
        <div id="battle-result" style="margin-top:10px"></div>

        <button class="battle-btn danger" onclick="leaveRoom()" style="margin-top:10px">退出房间</button>
      </div>
    </div>
  </div>

  <!-- FAVS -->
  <div id="pg-favs" class="page">
    <div class="sec-header">❤️ 收藏夹 <span class="badge" id="fb">0</span></div>
    <div class="card-list" id="flist"></div>
    <div class="empty" id="fempty"><div class="empty-emoji">😴</div><div class="empty-text">还没有收藏哦~</div></div>
  </div>

  <!-- HISTORY -->
  <div id="pg-hist" class="page">
    <div class="sec-header">📋 点餐记录 <span class="badge" id="hb">0</span></div>
    <div class="empty" id="hempty"><div class="empty-emoji">🍽️</div><div class="empty-text">还没有记录~</div></div>
    <div class="stats-box" id="hstats-box"></div>
    <div id="hlist"></div>
  </div>
</div>

<nav class="nav">
  <div class="nav-item active" data-p="home" onclick="go('home')"><span class="nav-icon">🏠</span>首页</div>
  <div class="nav-item" data-p="menu" onclick="go('menu')"><span class="nav-icon">🍽️</span>菜单</div>
  <div class="nav-item" data-p="random" onclick="go('random')"><span class="nav-icon">🎲</span>随机</div>
  <div class="nav-item" data-p="battle" onclick="go('battle')"><span class="nav-icon">⚔️</span>对战</div>
  <div class="nav-item" data-p="favs" onclick="go('favs')"><span class="nav-icon">❤️</span>收藏</div>
</nav>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal"></div></div>

// Storage
function gf(){try{return JSON.parse(localStorage._f||'[]')}catch{return[]}};function sf(v){localStorage._f=JSON.stringify(v)}
function gh(){try{return JSON.parse(localStorage._h||'[]')}catch{return[]}};function sh(v){localStorage._h=JSON.stringify(v)}
function gr(){try{return JSON.parse(localStorage._r||'{}')}catch{return{}}};function sr(v){localStorage._r=JSON.stringify(v)}
function isF(n){return gf().includes(n)};function isH(n){return gh().includes(n)}
function tF(n){let f=gf(),w=f.includes(n);if(w)f=f.filter(x=>x!==n);else f.unshift(n);sf(f);return!w}
function tH(n){let h=gh(),w=h.includes(n);if(w)h=h.filter(x=>x!==n);else h.unshift(n);sh(h);return!w}
function addH(r){let h=gh();h=h.filter(x=>x.name!==r.name);h.unshift({name:r.name,cat:r.category,area:r.location_area,rating:r.rating,price:r.price_range,time:new Date().toLocaleString('zh-CN'),rated:false});if(h.length>200)h=h.slice(0,200);sh(h)}
function delH(idx){let h=gh();h.splice(idx,1);sh(h);renderHist();renderHome()}
function rateH(idx,score){let h=gh();if(idx>=h.length)return;h[idx].rated=true;h[idx].score=score;sh(h);let rt=gr();rt[h[idx].name]=score;sr(rt);renderHist();renderHome()}
function t(msg){let el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2100)}

// Home
function renderHome(){
  let hates=gh(),pool=DATA.filter(r=>!hates.includes(r.name));
  let feat=[...pool].sort(()=>Math.random()-.5).slice(0,8);
  document.getElementById('feat-g').innerHTML=feat.map(r=>`<div class="feat-card" onclick="showD('${r.name.replace(/'/g,"\\'")}')"><div class="fc-name">${r.name}</div><div class="fc-tag">${gOf(r)}</div><div class="fc-rating">⭐${r.rating}</div></div>`).join('');
  let favs=gf(),fq=document.getElementById('fav-quick'),fs=document.getElementById('s-favs');
  if(favs.length===0)fs.style.display='none';else{fs.style.display='block';fq.innerHTML=favs.slice(0,5).map(n=>{let r=DATA.find(x=>x.name===n);if(!r)return'';return`<div class="quick-item" onclick="showD('${r.name.replace(/'/g,"\\'")}')"><span class="qi-emoji">❤️</span><div class="qi-text"><div class="qi-name">${r.name}</div><div class="qi-meta">${gOf(r)} · ⭐${r.rating}</div></div></div>`}).join('')}
  let hist=gh(),hq=document.getElementById('hist-quick'),hs=document.getElementById('s-hist');
  if(hist.length===0)hs.style.display='none';else{hs.style.display='block';hq.innerHTML=hist.slice(0,5).map((h,i)=>`<div class="quick-item" onclick="showD('${h.name.replace(/'/g,"\\'")}')"><span class="qi-emoji">${h.rated?'⭐':'🍽️'}</span><div class="qi-text"><div class="qi-name">${h.name}${h.score?' · '+'⭐'.repeat(h.score):''}</div><div class="qi-meta">${h.time}</div></div><span style="color:#ccc;font-size:14px;padding:4px" onclick="event.stopPropagation();delH(${i})">✕</span></div>`).join('')}
  let rt=gr(),rated=Object.entries(rt).filter(([_,s])=>s>=4).sort((a,b)=>b[1]-a[1]).slice(0,6),tr=document.getElementById('top-rated'),ts=document.getElementById('s-rated');
  if(rated.length===0)ts.style.display='none';else{ts.style.display='block';tr.innerHTML=rated.map(([n,s])=>{let r=DATA.find(x=>x.name===n);if(!r)return'';return`<div class="quick-item" onclick="showD('${r.name.replace(/'/g,"\\'")}')"><span class="qi-emoji">${'⭐'.repeat(s)}</span><div class="qi-text"><div class="qi-name">${r.name}</div><div class="qi-meta">${gOf(r)} · 评分${s}</div></div></div>`}).join('')}
}

// Menu
let mCuisine='all',mSearch='';
function buildChips(){let u=[...new Set(DATA.map(r=>gOf(r)))];document.getElementById('fscroll').innerHTML='<span class="chip active" onclick="setMC(\'all\')">🍽️全部</span>'+u.map(g=>`<span class="chip" onclick="setMC('${g}')">${g}</span>`).join('')}
function setMC(c){mCuisine=c;document.querySelectorAll('#fscroll .chip').forEach(ch=>ch.classList.toggle('active',ch.textContent.trim()===c||(c==='all'&&ch.textContent.includes('全部'))));renderMenu()}
function srch(){mSearch=document.getElementById('srch').value;renderMenu()}
function renderMenu(){
  let list=DATA;if(mCuisine!=='all')list=list.filter(r=>gOf(r)===mCuisine);if(mSearch)list=list.filter(r=>r.name.includes(mSearch));
  let cl=document.getElementById('mlist');if(list.length===0){cl.innerHTML='<div class="empty"><div class="empty-emoji">😅</div><div class="empty-text">没找到</div></div>';return}

// ===================== BATTLE with PeerJS =====================
let peer=null,conn=null,myPicks=[],oppPicks=[],isHost=false,gameStarted=false,timerInterval=null,myConfirmed=false,oppConfirmed=false,currentPeerId='',connReady=false;

function createRoom(){
  if(peer){peer.destroy();peer=null}conn=null;connReady=false;
  myPicks=[];oppPicks=[];gameStarted=false;myConfirmed=false;oppConfirmed=false;
  let code=String(Math.floor(100000+Math.random()*900000));
  let peerId='eat'+code;
  peer=new Peer(peerId,{debug:0});
  peer.on('open',id=>{
    currentPeerId=id;
    isHost=true;
    document.getElementById('battle-connect').style.display='none';
    document.getElementById('battle-lobby').style.display='block';
    document.getElementById('code-show').innerHTML=`匹配码<div style="font-size:40px;font-weight:900;margin-top:8px;letter-spacing:4px">${id.replace('eat','')}</div>`;
    document.getElementById('peer-status').textContent='等待对方加入...';
    t('房间已开启！');
  });
  peer.on('connection',c=>{
    conn=c;setupConn();
    conn.on('open',()=>{
      connReady=true;
      document.getElementById('peer-status').textContent='✅ 对方已连接！';
      conn.send({type:'ready'});
    });
  });
  peer.on('error',e=>{t('连接失败');console.error(e);document.getElementById('peer-status').textContent='❌ 连接失败，请重试'});
  peer.on('disconnected',()=>{peer.reconnect()});
}

function joinRoom(){
  let code=document.getElementById('join-code').value.trim();
  if(!code){t('请输入匹配码');return}
  if(peer){peer.destroy();peer=null}conn=null;connReady=false;
  myPicks=[];oppPicks=[];gameStarted=false;myConfirmed=false;oppConfirmed=false;
  let peerId='eat'+code;
  peer=new Peer(null,{debug:0});
  peer.on('open',id=>{
    currentPeerId=id;isHost=false;
    conn=peer.connect(peerId,{reliable:true});
    setupConn();
    conn.on('open',()=>{
      connReady=true;
      document.getElementById('battle-connect').style.display='none';
      document.getElementById('battle-lobby').style.display='block';
      document.getElementById('code-show').innerHTML=`已加入房间<div style="font-size:14px;margin-top:4px">匹配码: ${code}</div>`;
      document.getElementById('peer-status').textContent='✅ 已连接！';
      conn.send({type:'ready'});
    });
  });
  peer.on('error',e=>{t('连接失败');console.error(e);document.getElementById('peer-status').textContent='❌ 连接失败，请输入正确的匹配码'});
  peer.on('disconnected',()=>{peer.reconnect()});
}

function setupConn(){
  conn.on('data',data=>{
    if(data.type==='picks'){oppPicks=data.picks;renderOppPicks()}
    else if(data.type==='confirm'){oppConfirmed=true;checkBothConfirm()}
    else if(data.type==='result'){showBattleResult(data.result)}
    else if(data.type==='finalRPS'){handleFinalRPS(data)}
    else if(data.type==='finalRPSResult'){document.getElementById('final-rps-result').innerHTML=data.text}
    else if(data.type==='ready'){
      if(!gameStarted)startPicking();
    }
  });
  conn.on('close',()=>{t('对方已断开');document.getElementById('peer-status').textContent='❌ 连接断开'});
}

function startPicking(){
  gameStarted=true;
  document.getElementById('picks-area').style.display='block';
  document.getElementById('game-timer').style.display='block';
  let timeLeft=180;
  updateTimer(timeLeft);
  timerInterval=setInterval(()=>{
    timeLeft--;updateTimer(timeLeft);
    if(timeLeft<=0){if(!myConfirmed)autoConfirm();}
  },1000);
}

function updateTimer(sec){
  let el=document.getElementById('game-timer');
  let m=Math.floor(sec/60),s=sec%60;
  el.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(sec<=30?' warning':'');
  if(sec<=0){clearInterval(timerInterval);if(!myConfirmed){t('时间到！自动确认');autoConfirm()}}
}

function bSearch(){
  let q=document.getElementById('bsearch').value;
  if(!q||q.length<1){document.getElementById('bsr').innerHTML='';return}
  let results=DATA.filter(r=>r.name.includes(q)&&!myPicks.includes(r.name)).slice(0,8);
  document.getElementById('bsr').innerHTML=results.map(r=>`<div onclick="addPick('${r.name.replace(/'/g,"\\'")}')">${r.name} · ${gOf(r)}</div>`).join('');
}

function addPick(name){
  if(myPicks.length>=5){t('最多选5家');return}
  if(myPicks.includes(name)){t('已选过');return}
  myPicks.push(name);
  renderMyPicks();
  document.getElementById('bsearch').value='';
  document.getElementById('bsr').innerHTML='';
  document.getElementById('mypick-count').textContent=myPicks.length;
  updateConfirmBtn();
  syncPicks();
}

function removePick(name){
  myPicks=myPicks.filter(x=>x!==name);
  renderMyPicks();
  document.getElementById('mypick-count').textContent=myPicks.length;
  updateConfirmBtn();
  syncPicks();
}

function renderMyPicks(){
  document.getElementById('mypicks').innerHTML=myPicks.map(n=>`<span class="bp-chip selected" onclick="removePick('${n.replace(/'/g,"\\'")}')">${n} ✕</span>`).join('');
}

function renderOppPicks(){
  document.getElementById('oppicks').innerHTML=oppPicks.map(n=>`<span class="bp-chip opponent">${n}</span>`).join('')||'<span style="font-size:11px;color:#ccc">对方还没选</span>';
}

function syncPicks(){
  if(conn)conn.send({type:'picks',picks:myPicks});
}

function updateConfirmBtn(){
  let btn=document.getElementById('confirm-btn');
  if(myPicks.length===5){btn.disabled=false;btn.style.opacity='1';btn.textContent='✅ 确认选择 (双方确认后开始)'}else{btn.disabled=true;btn.style.opacity='.5';btn.textContent='确认选择 (需选满5家)'}
}

function confirmPicks(){
  if(myPicks.length!==5){t('需选满5家');return}
  myConfirmed=true;
  if(conn)conn.send({type:'confirm'});
  document.getElementById('confirm-btn').textContent='⏳ 已确认，等待对方...';
  document.getElementById('confirm-btn').disabled=true;
  document.getElementById('confirm-btn').style.opacity='.7';
  checkBothConfirm();
}

function autoConfirm(){
  if(myPicks.length<5){while(myPicks.length<5){let pool=DATA.filter(r=>!myPicks.includes(r.name));myPicks.push(pool[Math.floor(Math.random()*pool.length)].name)}renderMyPicks();document.getElementById('mypick-count').textContent='5';syncPicks()}
  confirmPicks();
}

function checkBothConfirm(){
  if(myConfirmed&&oppConfirmed&&gameStarted){
    clearInterval(timerInterval);
    document.getElementById('game-timer').style.display='none';
    doBattle();
  }
}

function doBattle(){
  let p1rs=myPicks.map(n=>DATA.find(x=>x.name===n)).filter(Boolean);
  let p2rs=oppPicks.map(n=>DATA.find(x=>x.name===n)).filter(Boolean);
  if(p1rs.length!==5||p2rs.length!==5){t('数据异常');return}

  // 按餐厅名字比对
  let p1Names=p1rs.map(r=>r.name), p2Names=p2rs.map(r=>r.name);
  let matches=[];
  for(let i=0;i<5;i++)if(p2Names.includes(p1Names[i]))matches.push(p1Names[i]);

  let result={matches:matches,p1Names:p1Names,p2Names:p2Names};
  showBattleResult(result);
  if(conn)conn.send({type:'result',result:result});
}

function showBattleResult(result){
  let p1Names=result.p1Names, p2Names=result.p2Names, matches=result.matches;
  let html='<div style="text-align:center"><div style="font-size:17px;font-weight:700;color:var(--heart);margin-bottom:8px">⚔️ 对战结果</div>';

  if(matches.length===1){
    html+=`<div style="font-size:15px;color:#388e3c;font-weight:600;margin-bottom:8px">🎉 你们都选了同一家！</div>`;
    html+=`<div style="background:#e8f5e9;border-radius:14px;padding:16px;margin-bottom:10px;font-size:18px;font-weight:700;color:#388e3c">${matches[0]}</div>`;
    html+=`<div style="font-size:13px;color:#666">心有灵犀！就去这家吧 ❤️</div>`;
  }else if(matches.length>=2){
    html+=`<div style="font-size:14px;color:#ff6b4a;font-weight:600;margin-bottom:8px">🤔 有 ${matches.length} 家相同！</div>`;
    html+=`<div style="font-size:12px;color:#666;margin-bottom:10px">猜拳吧，赢的选其中一家！</div>`;
    matches.forEach(m=>{
      html+=`<div style="background:var(--light);border-radius:8px;padding:6px;margin-bottom:4px;font-size:13px;font-weight:600">✅ ${m}</div>`;
    });
    html+=`<div style="display:flex;gap:6px;justify-content:center;margin:10px 0">
      <button class="btn" onclick="sendFinalRPS('✊')" style="width:50px;height:50px;border-radius:50%;font-size:26px">✊</button>
      <button class="btn" onclick="sendFinalRPS('✋')" style="width:50px;height:50px;border-radius:50%;font-size:26px">✋</button>
      <button class="btn" onclick="sendFinalRPS('✌️')" style="width:50px;height:50px;border-radius:50%;font-size:26px">✌️</button>
    </div>`;
    html+=`<div id="final-rps-result" style="font-size:14px;font-weight:700;color:var(--heart);margin-top:6px"></div>`;
  }else{
    html+=`<div style="font-size:14px;color:#ff6b4a;font-weight:600;margin-bottom:8px">😤 没有相同的店！</div>`;
    html+=`<div style="font-size:12px;color:#666;margin-bottom:10px">猜拳决胜负，赢的人说了算！</div>`;
    html+=`<div style="display:flex;gap:6px;justify-content:center;margin:10px 0">
      <button class="btn" onclick="sendFinalRPS('✊')" style="width:50px;height:50px;border-radius:50%;font-size:26px">✊</button>
      <button class="btn" onclick="sendFinalRPS('✋')" style="width:50px;height:50px;border-radius:50%;font-size:26px">✋</button>
      <button class="btn" onclick="sendFinalRPS('✌️')" style="width:50px;height:50px;border-radius:50%;font-size:26px">✌️</button>
    </div>`;
    html+=`<div id="final-rps-result" style="font-size:14px;font-weight:700;color:var(--heart);margin-top:6px"></div>`;
    html+=`<div style="margin-top:8px;font-size:11px;color:#999">👨 ${p1Names.slice(0,3).join('、')}...</div>`;
    html+=`<div style="font-size:11px;color:#999">👩 ${p2Names.slice(0,3).join('、')}...</div>`;
  }
  html+='</div>';
  document.getElementById('battle-result').innerHTML=html;
}

function sendFinalRPS(choice){
  document.getElementById('final-rps-result').innerHTML='你出了 '+choice+'，等待对方...';
  if(conn)conn.send({type:'finalRPS',choice:choice});
  window._finalMyRPS=choice;
}

function handleFinalRPS(data){
  let myChoice=window._finalMyRPS;
  if(!myChoice) return;
  let oppChoice=data.choice;
  let result,rstText;
  if(myChoice===oppChoice){result='tie';rstText='平局！再来一次 ✊✋✌️'}
  else if((myChoice==='✊'&&oppChoice==='✌️')||(myChoice==='✋'&&oppChoice==='✊')||(myChoice==='✌️'&&oppChoice==='✋')){
    result='win';rstText='🎉 你赢了！去吃你选的！';
  }else{
    result='lose';rstText='👩 老婆赢了！去吃她选的！';
  }
  document.getElementById('final-rps-result').innerHTML=`你${myChoice} vs 对方${oppChoice}<br>${rstText}`;
  if(conn)conn.send({type:'finalRPSResult',text:rstText,choice:oppChoice});
}
